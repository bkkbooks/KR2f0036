body:
  text: 華野疏稿詔令奏議𩔖二奏議之屬提要臣等謹案華野疏稿五巻國朝郭琇撰琇即墨人華野其字也康熙庚戌進士官至湖廣總督此編乃其歴官奏疏起康熙二十七年迄四十一年凡四十四篇疏末多載原奉諭㫖葢琇所恭録而其後人彚刋以𫝊也琇初由吳江知縣行取入臺即劾罷大學士明珠尚書王鴻緒等聖祖仁皇帝嘉其敢言洊擢左僉都御史進左都御史後縁事鐫秩復起為湖廣總督在官四年别以紅苗搶掠一事禠職歸葢當其彈抨得實則拔擢以旌其忠當其貽悞封疆則罷斥以明其罪仰見聖祖仁皇帝行政用人大公獨斷賞罰悉視其自取而無一毫畸輕畸重於其間前者纂輯五朝國史列傳特命於明珠及王鴻緒𫝊中各載琇劾疏全文毋庸刪削復頒示綸音闡明其進退之由俾共知琇之罷官非由傾軋百爾臣工仰承誥誡已無不曉然共喻臣等謹録琇此編並恭録前奉諭㫖冠諸巻端庶彞訓昭然永垂成憲益共知所警勵焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀乾隆三十七年十月二十八日奉上諭國史館進呈新纂明珠列傳内所列郭琇紏㕘各欵臚採不全於核實紀載之義未合明珠在康熙年間身為大學士柄用有年乃竟不克自終漸至植黨營私市恩通賂勢燄熏灼物議沸騰皇祖叠申誡諭期得以恩禮保全而明珠不知省改致為郭琇㕘奏復念其於平定三藩時曾有贊理軍務㣲勞不即暴示罪狀然亦立予罷斥並未甞廢法姑容後雖量為録用僅授内大臣之職距其身殁二十餘年不復再加委任此實皇祖恩威並用權衡纎毫不爽迥非三代以後所可幾及而確核明珠罪案秖在徇利太深結交太廣不能恪守官箴要不致如明代之嚴嵩温體仁輩竊弄威福竟敢隂排異已潛害忠良舉朝側目而莫可誰何也即如明珠以現任閣臣而郭琇即以露章臚欵抨擊甚力使明珠果能如明季諸奸之箝制言路則郭琇矢口之間早已禍不旋踵即或深謀修隙亦必多方狙伺假手擠排乃郭琇因此一疏遂以鯁直受知不及二年即由僉都御史洊擢都御史不聞明珠之黨有能為之抑沮者雖其間亦曾因事論黜而我皇祖鑒其政績風力由閒廢中擢為湖廣總督後因紅苗搶奪隠匿不報削籍歸里其罪實由自致亦非明珠之黨藉事以為報復今郭琇列傳具在可攷而知也至扵明珠生平是非功過原不相掩我皇祖慎持予奪之柄至公至明因物付物恭繹聖諭仁至義盡一一適如其人之所自取即此可以窺見萬一兹館臣裒輯明珠事蹟因檢閣庫未獲郭琇劾章似由當日留中不下遂據館中所存郭琇疏稿刋本撮載大凡但其間刪削過多恐𫝊之既久或疑修史者有意曲為隠諱於据事直書之㫖無當也因命於明珠𫝊中全列郭琇㕘本俾天下後世得喻此事本末共知我國家立綱陳紀朝宁肅清從無有宵小僉壬如前代之得以怙權干政而我皇祖聖明英斷刑賞持平實為執兩用中之極則朕禀承祖訓凡一切用人行政無不本此意為折衷用是剖悉原委宣諭中外仍命録載𫝊後使定論昭然永以示𫝊信而垂法戒焉欽此乾隆四十年三月二十六日奉上諭國史館進呈所纂王鴻緒列傳于左都御史郭琇劾鴻緒與髙士竒招納賄賂等案僅叙大畧而郭琇原疏未經載入恐𫝊之後世其不知鴻緒輩之罪狀者妄疑一劾即去或有屈抑其知者又疑秉史筆之人意存袒䕶不肯顯暴其短豈朕特命另修史傳之意乎夫王鴻緒髙士竒與明珠徐乾學諸人當時互為黨援交通營納衆所共知如郭琇所劾諸事並不為枉而我皇祖不加窮究僅予罷退葢扵明珠念其曾有襄辦討平吴逆之勞而王鴻緒髙士竒諸人則因文學尚優宣力史館是以屢下明詔剴切曉諭曲予矜全實由我皇祖聖德然即以諸人事蹟而論雖有交結納賄之私亦止於暗為闗照不至勢燄薫灼生殺擅専如前明嚴嵩輩之肆奸蠧國陷害正人此亦人所共知也即如郭琇㕘劾明珠王鴻緒諸人後旋經皇祖特加任用未聞有能稍事排擠者即其後郭琇於總督任内因他事罷官亦由其自取並非諸人之所能媒孽又實由我皇祖聖明是郭琇原疏於諸人被劾欵蹟皆當據事直書不必稍為刪節使天下後世曉然於王鴻緒輩之罪狀如此郭琇之鯁直如此其後之自取罪戾如此並敬悉我皇祖之仁智並用措置得中又如此既可令海内𫝊為美談且足令朝臣共知鑑戒其於世道人心甚為有益何必曲存隠諱乎其明珠本傳前已降㫖改修外著交該館總裁將王鴻緒徐乾學髙士竒等列傳覆加核訂所有郭琇等原劾諸疏悉載入𫝊内另繕呈覽其餘有𩔖此者並著一體詳載以示大公而昭𫝊信焉欽此
