body:
  text: 華野疏稿卷一湖廣總督郭琇撰特參河臣疏題為河臣蠧國纍民幕賓冒濫名器仰祈睿鑒譴斥事臣一介豎儒七年外吏蒙皇上隆恩破格拔置言路臣感激高深無可仰報惟是不避嫌怨庶可稍盡臣職萬一竊見海宇升平萬邦底定而皇上宵旰殷憂時切如傷之念者止此一線之黃河與淮揚等州縣昏墊之黎民耳皇上委任於河臣靳輔靳輔又專聽命於幕賓陳潢如果洪水歸洋狂瀾永息猶得有辭以報君上乃今日議築堤明日議挑濬縻費帑金數百萬而河患如故今日題河道明日題河廳以朝廷爵位為私恩而卒無止期又復攘奪民田妄稱屯墾橫取米麥越境貨賣皇上以下河為必可開而靳輔百計阻撓必令功垂成而終止至於屯田一事皇上洞知其纍民查勘諸臣亦知其纍民則靳輔陳潢之罪燎如指掌矣總之陳潢之策為靳輔營一家之謀於國計民生全無裨益忌功之念重而圖利之心堅真國之蠧而民之賊也監司何等之貴僉事何等之尊豈容一介小人冒濫名器僅以快靳輔酬恩償賄之私願乎伏祈皇上乾斷立賜譴革敕部嚴加處分另簡滿漢大臣清亷敏練者整理河務庶成功可奏黃河南北之億萬生靈永享萬年之利矣仰祈睿鑒施行謹題請旨康熙二十七年正月二十二日題二十六日奉旨這所參事情著九卿詹事科道一併嚴察議奏特糾大臣疏題為特糾大臣背公結黨納賄營私仰請乾斷立賜嚴譴以清政本事臣聞自古帝王御天下之道舉直錯枉而已堯舜之世未嘗不有共鯀歡兜堯舜始焉因其才而姑用之繼焉知其姦而誅殛之故唐虞之世稱為極盛我皇上聖德純粹聖鑒淵深與放勳重華異世同揆臣竊見皇上用人行政孜孜求治惟恐一夫不被澤一物不得所私竊歎誦以為千古難遘邇者幾務之地姦邪逞詐植黨類以樹私竊威福以惑衆日益縱肆皇上灼知情偽於一切用人皆由宸聰獨斷中外翕服無不踊躍思奮臣蒙皇上破格超擢感激流涕莫知所以為報竊自念職在糾彈仰體堯舜之心輒效鷹鸇之逐謹將大學士明珠余國柱背公營私實迹臚列具陳於左一凡閣中票擬俱由明珠指麾輕重任意余國柱承其風旨即有舛錯同官莫敢駁正皇上聖明時有詰責乃漫無省改即如陳紫芝參劾張汧疏內并請議處保舉之員皇上面諭九卿應一體嚴處乃票擬竟不之及則保舉張汧原屬指麾即此可見矣一明珠凡奉諭旨或稱其賢則向彼云由我力薦或稱其不善則向彼云上意不喜吾當從容挽救且任意增添以市恩立威因而要結羣心挾取貨賄至於每日啓奏畢出中左門滿漢部院諸臣及其腹心拱立以侍皆密語移時上意無不宣露部院衙門稍有關係之事必請命而行一明珠連結黨羽滿洲則佛倫葛思泰及其族姪傅臘塔席珠等漢人之總攬者則余國柱結為死黨寄以腹心向時凡會議會推皆佛倫葛思泰等把持而國柱更為之囊槖惟命是聽但知戴德私門一凡督撫藩臬缺出余國柱等無不展轉販鬻必索及滿欲而後止是以督撫等官愈事剝削小民重困今天下遭遇聖主愛民如子而民間猶有未給足者皆債官搜索以奉私門之所致也一康熙二十三年學道報滿之後應升學道之人率往論價九卿選擇時公然承風任意派缺缺皆預定由是學道皆多端取賄士風文教因之大壞一靳輔與明珠余國柱交相固結每年縻費河銀大半分肥所題用河官多出指授是以極力庇護皇上試察靳輔受任以來請過錢糧幾何通盤一算則其弊可知矣當下河初議開時彼以為必委任靳輔欣然欲行九卿亦無異辭及皇上欲另委人則以于成龍方沐聖眷舉出必當上旨而成龍官止臬司可以統攝於是議題奏仍屬靳輔此時未有阻撓意也及靳輔張大其事與成龍議不合於是始一力阻撓皆由倚托大臣故敢於如此天鑒甚明當洞悉靳輔纍纍抗拒明詔非無恃而然也一科道官有內升出差者明珠余國柱率皆居功要索至於考選科道即與之訂約凡有本章必須先行請問由是言官多受其牽制一明珠自知罪戾見人輒用柔顔甘語百般欵曲而隂行鷙害意毒謀險最忌者言官恐發其姦狀當佛倫為總憲時見御史李時謙纍奏稱旨御史吳震方頗有參劾即令借事排陷聞者駭懼以上各欵但約略指參總之明珠一人其智足以窺探上旨其術足以彌縫罪惡又有余國柱姦謀附和負恩之罪書之罄竹難盡皇上鼓舞臣僚責其實心報效臣受非常殊眷若舍豺狼而問狐狸即為辜負聖恩臣罪滋大臣固知其黨羽實繁睚眥必報恃有聖主當陽何所畏忌伏祈霆威立加嚴譴簡用賢能俾贊密勿天下人情莫不欣暢感戴聖明無盡仰祈皇上睿鑒施行謹題請旨康熙二十七年二月初六日題本月十一日奉上諭諭吏部國家建官分職經理庶政必須矢志精白大法小廉各守職業實心任事庶無負拔擢簡用之意朕親理萬幾歷有年所於爾部院大小官員行事無不深知為臣子者既擔爵受祿榮及父母庇其子孫家能自給便當知足無致隕越前已屢頒諭旨嚴行申誡又復諄諄面諭訓誨再三今在廷諸臣自大學士以下有職掌官員以上全不恪勤乃職惟知早出衙署偷安自便三五成羣互相交結同年門生相援引傾陷商謀私事徇庇同黨圖取貨賂作弊營私種種情狀確知已久九卿詹事科道皆朕委任之員凡遇會議自當各出已見公同商酌乃一二欲行倡率之人持議於前衆遂附和於後雷同草率一意詭隨又其甚者雖在會議之班茫無知識隨衆畫題希圖完結廷議如此國是何憑又有當集議時緘默自容及至僨事巧於推卸朕深惡此等推諉茍容之輩亦屢加嚴飭至於用人關係重大羣臣賢否難以周知遇緊要員缺特令會同推舉原期為國得人實有裨益亦欲令被舉者警心易慮恐致溺職纍及舉者因而勉自刻勵九卿諸臣宜體朕心從公選舉方為不負委任乃歷來所舉官員稱職者固有而貪黷匪類往往敗露此皆瞻顧情面植黨納賄所致凡此情弊朕非不知前者班布爾善阿思哈等身為大臣所行悖亂致干憲典遂行正法至今猶耿於懷是以比來大小官員背公徇私交通貨賄朕雖洞見而不即指處冀其自知罪戾痛加省改庶可終始保全詎意積習深錮漫無悛悔如審擬蔡育榮一案庇護挽救瞻徇黨類百計營求因朕具悉其姦私謀未遂近差色楞格往審張汧所參事情朕面諭色楞格張汧居官貪穢爾宣嚴行審出逮差回時詢問色楞格奏稱臣於此案盡心研鞫若有失實甘受誅戮及覽其奏案惟恐纍及保舉張汧之人並未議及業行折出又念張汧審結定罪之後自然發露因仍用原僉票發又靳輔下河工程屯田之案朕早已察其情弊特遣佛倫等前往勘議今所議悉屬偏私且凡會議之時科爾坤佛倫等務執已見持論好勝茍非懷挾私情何以力排衆議朕亦曾面加誡諭未見畏悔如此積弊愈久愈深物議沸騰輿情憤激以致言官列欵參奏本應發明其事以肅官方因不忍遽行加罪大臣且用兵之時有效勞迹者故免其發明勒德洪明珠著革去大學士交於領侍衛內大臣酌用李之芳著休致回籍余國柱著革職科爾坤著以原品解任佛倫熊一瀟等著解任於河工案內完結嗣後大小臣工各宜洗滌肺腸痛改陋習潔已奉公勉盡職業以副朕寬大矜全咸與維新之至意爾部即遵諭行特諭特參近臣疏題為特參近臣植黨營私招搖撞嵗罪有可誅仰請乾斷事臣一介庸儒臺班末職荷蒙皇上特恩拔擢歷位中丞高厚既深涓埃無補備員尸位局蹐難安惟思知無不言言必由中以稍盡犬馬之愚衷耳皇上宵旰焦勞勵精圖治用人行政皆出睿裁未嘗􅊏毫假手左右乃有植黨營私招搖撞嵗如原任少詹事高士竒左都御史王鴻緒等表裏為姦恣肆於光天化日之下罪有可誅罄竹難悉試約略一二為皇上陳之高士竒出身微賤其始也徒步來京覔館為生皇上因其字學頗工不拘資格擢補翰林令入南書房供奉不過使之考訂文章原未假之與聞政事為士竒者即當竭力奉公以報君恩於萬一計不出此而日思結納諂附大臣攬事招搖以圖分肥凡內外大小臣工無不知有士竒之名夫辦事南書房者先後豈止一人而他人之聲名總未著聞何士竒一入辦事而聲名赫奕乃至如此是其罪之可誅者一也久之羽翼既多遂自立門户結王鴻緒為死黨科臣何楷為義兄弟翰林陳元龍為叔侄鴻緒胞兄王頊齡為子女姻親俱寄以腹心在外招攬凡督撫藩臬道府廳縣以及在內之大小卿員皆王鴻緒何楷等為之居停哄騙而夤緣照管者餽至成千纍萬即不屬黨護者亦有常例名之曰平安錢然而人之肯為賄賂者蓋士竒供奉日久人皆謂之曰門路真而士竒遂自忘乎其為撞嵗亦居之不疑曰我之門路真是士竒等之姦貪壞法全無顧忌其罪之可誅者二也光棍俞子易在京肆橫有年惟恐事發潛遁直𨽻天津山東洛口地方有虎房橋瓦房六十餘間價值八千金餽送士竒求托照拂此外順城門斜街並各處房屋總令心腹出名置買何楷代為收租打磨場士竒之親家陳元師夥計陳季芳開張緞號寄頓各處賄銀資本約至四十餘萬又於本鄉平湖縣置田産千頃大興土木修整花園杭州西溪廣置園宅蘇松淮揚王鴻緒等與之合夥生理又不下百餘萬竊思以覔館糊口之窮儒而今忽為數百萬之富翁試問金從何來無非取給於各官然官從何來非侵國帑即剝民膏夫以國帑民膏而填無厭之溪壑是士竒等真國之蠧而民之賊也其罪之可誅者三也皇上聖明洞悉其罪止因各館史書編纂未完著解任竣事矜全之恩至矣極矣士竒乃不思改過自新仍怙惡不悛當聖駕南巡時上諭嚴誡餽送定以軍法治罪誰敢不遵惟士竒與王鴻緒愍不畏死即淮揚等處王鴻緒招攬府廳各官約餽萬金潛遺士竒淮揚如此他處又不知如何索詐矣是士竒等之欺君滅法背公行私其罪之可誅者四也更可駭者王鴻緒陳元龍鼎甲出身亦儼然士林之翹楚者竟不顧清議為人作壟斷而不以為恥且依媚大臣無所不及即人之所不屑為者亦甘心為之而不以為辱茍圖富貴傷敗名教豈不玷朝廷而羞當世士哉總之高士竒王鴻緒陳元龍何楷王頊齡等豺狼其性蛇蝎其心鬼蜮其形畏勢者既觀望而不敢言趨勢者復擁戴而不肯言臣若不言是臣負聖恩臣罪滋大臣故不避嫌怨仰請皇上大奮乾綱立賜罷斥明正典刑人心快甚天下幸甚臣因糾參貪穢憤激直陳字多逾格伏祈睿鑒施行謹題請旨康熙二十八年九月十五日題本月十九日奉旨高士竒王鴻緒陳元龍何楷王頊齡俱著休致回籍該部知道詳訂全書疏題為全書原有舊章止宜斟酌損益不宜草率編輯仰祈簡員纂修急正舛錯事臣惟古帝王則壤成賦原有三等九則之不同而什一之征取民有制所以文誥書契載籍版圖家諭户曉班班可考我皇上勵精圖治念切民生特允部臣之請編輯簡明全書將使四海九州窮鄉僻壤咸知賦有定額册無繁文法固善也為部臣者自應仰體德意斟酌至當不負皇上委任之聖心乃悠忽蹉跎遞相傳換以纂修為捷徑視編輯如具文書未告成升遷絡繹遲延四載始得進呈其堂司各官多非原事之人及敕下九卿等公同參閲倉卒具覆僉曰簡明臣思部臣纂修於數載九卿會看於一時手執一編目經數紙以為簡則誠簡矣而簡中之遺漏錯誤者無從而知也以為明則誠明矣而明中之缺略參差者無從而辨也幸皇上聖明早已知其未當矣奉旨這全書著發與各巡撫會同經管錢糧司道官員詳察細閲有無應行更改增刪務期永遠可行明白確議毋得彼此瞻顧各行具題到日再議具奏今各省撫臣陸續具題全書之茍簡不可枚舉有應歸起運而載入存留者有應歸存留而載入起運者有應刪除而未刪除者有應增入而未增入者有多造數目者有少編銀兩者有支解朦混不清者有徵給重復開載者種種差訛不一而止各撫臣具題本章與繳還登注之原書一一可驗也夫司道經管錢糧撫臣身任地方其所考訂諒無差誤然不過就一省言一省之事合天下而計之其參訂不符未及詳載者又不知其凡幾也况今直𨽻各省停止由單原謂既有全書由單可以不用倘以此書為賦役之全則一省之書不過五六十頁由省分之各府則一府不過數十頁由府分之各縣則一縣不過片紙而已竊思大縣錢糧有三四十萬以及數萬者中縣小縣亦有七八萬以及一二萬者以片紙之全書即中小縣之賦役亦不能分晰欵項悉載明白况大縣乎是有全書之名而無全書之實矣夫全書既失其實而民間之輸納無憑則或有不肖有司姦胥猾吏勢必至上下其手顛倒那移飛灑作弊其流毒可勝言哉臣查一應纂修事務俱選才能文學之員獨賦役全書止責之户部當日之司農或未經入目各司或不諳權衡襲舊本之大綱撮前人之條目止一算手書吏之所為非可以經久而垂憲也伏祈皇上於在廷滿漢諸臣擇其學識明通老成練達者令為總裁而以各衙門之品行端方才能素著者共司編輯停其遷轉限以嵗月即將各省撫臣所題新書舛錯之本章與舊存全書並歷年裁扣增添案卷互相參酌應增入者增入之不必厭其繁應刪改者刪改之不必嫌其簡其賦役之綱目條欵多寡盈虧詳訂分明參酌均平務期為永遠不易之章程至書成之後量加優奬則人知鼓舞悉心任事於皇上愛民定賦之至意或稍有裨於萬一也臣從詳陳全書起見字多逾格仰祈睿鑒施行謹題請旨康熙二十八年九月十五日題十九日奉旨這本內事情九卿詹事科道會同確議具奏剖明心迹疏奏為剖明心迹雖死猶生事竊臣生性戅直疾惡如仇去嵗一疏兩疏今嵗又一疏不避嫌怨不畏報復無非去當道之豺狼而為社稷生民計也乃若輩之怨臣恨臣願得臣而甘心焉蓋已久矣特無隙可乘耳適值張星法糾參錢珏而珏遂以主使誣臣在珏之含沙噴人其或出若輩之指使不指使不可知然在臣斷不學錢珏之寡廉鮮恥而妄行扳扯以自求解免也蒙皇上敕下部院嚴察虛公之意原欲求得實據非有成見必欲坐罪於臣不知馬齊與臣何仇何怨於部院諸臣之中獨主廷斷任口索瘢求疵多方煅煉自本月初三日問起至初十日午後大聲疾呼向星法云明白對你説必問你要一主使之人方止及星法供訪之道路之口而不聽供伊戚段姓者親往訪之而不聽又供伊友任姓者親筆手書差送單欵而不聽遂以捉風捕影毫無憑據之事輕將星法議送刑部又蒙皇上大聖大仁洞燭寃抑令從寬典止將段姓者付刑部審理及諸臣會鞫馬齊羞老成怒又獨主廷斷將段姓者嚴行夾訊自午至日暮幾放幾收竊思段姓者書生也三木之下何求不得初夾時因而亂供云某人主使怒曰亂供不聽再夾又供某人主使怒曰亂供不聽及三夾又供他堂官郭某也説他該參來馬齊遂喜見顔色曰這就是了始將段姓者鬆放此等取供情形在部院同事諸臣皆共聞見是馬齊之或為若輩主使或為錢珏主使亦未可定臣猶曾記張星法參錢珏之日馬齊曾面對臣言皇上南巡時我曾啓奏他好來故今日得專訊鞫若不嚴比張星法主使之人則從前欺罔君父之罪難逃所以肆行羅織而必欲致臣於死地也然臣死何足惜但天下後世笑臣無氣無骨不敢參一巡撫而假手於他人何其前勇而後怯也是臣之氣節所關言路之通塞所係臣死不甘心也惟得見皇上剖明心事使天下後世知臣之死由於姦邪羅織隂謀煅煉則臣雖死猶生矣故不得不披肝露膽嘔心吐血而陳伏乞聖明全覽而垂察焉謹奏請旨康熙二十八年十月初六日奏後發出附張星法參錢珏錢珏扳扯私書案內坐主使部院擬罪革職問杖不準折贖具奏奉旨郭琇鯁直敢言姑免罪降五級調用餘依議華野疏稿卷一
