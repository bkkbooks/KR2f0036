body:
  text: 華野疏稿卷五湖廣總督郭琇撰糾參州牧疏題為特參貪庸州牧以清吏治事竊照州牧為親民之官務在潔巳奉公愛養百姓乃為不負職守臣自涖任以來惟思精白乃心日夜氷兢期俾官稱其職民安其業以仰副我皇上軫恤元元之至意詎猶有貪庸敗檢如彛陵州知州李廣其人者唯利是視因而上下其手苛剝不恤民命重派惟聽蠧言穢聲著聞大玷官針者也今據署理湖北布政司事按察使李華之湖北按察使李華之分巡上荆南道副使胡蔚先荆州府知府魏勷各揭報前來與臣訪聞無異謹臚列欵迹為我皇上陳之一本官聽信積蠧雷時豫户書趙於斯凡事把持於本年二月初六日在城隍廟唤里民議每斗田糧除納三錢六分七釐正銀外又苛派銀四錢八分闔邑約派銀二千餘兩僉點册書催辦差役劉先押認以致道路沸騰穢聲彰著里民劉常如吕家祚等證一該州有康熙八年安插福建之海丁一百九十餘名墾荒納糧後隨吳逆叛去所遺田糧州民頂耕輸賦除納正項外又聽户書趙於斯等仍每斗加派銀四錢八分以圖分肥貽纍里民趙愈霞等證一本官編審不思革除積弊乃聽經承趙於斯受賄之多寡為户口之增減於每戶索銀七八錢不等約計得銀三百餘兩以致里民之有者欺隱無者寃抑官若木偶竟置罔聞談君熊黃文若等證一該州有川客販賣耕牛每次一二千隻不等每牛稅銀不過二三分本官聽信兵房李枝先喻見章等管收牛稅其各處買牛者每隻必索銀二錢方發契票漫無覺察兵書牛票可審此一官者庸鄙性成貪婪無厭任蠧役之調撥致百姓於苦纍誠難一日姑容民上所當特疏糾參請旨將知州李廣革職與有名蠧役犯證一併嚴提究擬者也臣謹會同湖廣撫臣年遐齡合詞具題伏乞皇上睿鑒施行康熙四十一年四月十八日題三疏告休疏奏為君恩髙厚已極微臣病勢難支伏乞聖明垂慈俯賜罷斥以全餘生事竊臣一介草茅辦事楚中已及三載寸長未效有負恩眷前臣以久病不痊恐誤封疆兩疏乞休俱蒙溫旨慰留我皇上之遇臣者厚矣臣之所以報我皇上者亦薄矣而屢瀆天聽冒干宸嚴臣之罪尚可逭乎而臣心實有不容巳者臣年邁氣衰連歲痰症時時舉發然時作時止醫藥調理猶得勉強支持唯自去冬吐㵼之後脾氣大傷飲食漸減延至今歲交夏以來氣血日枯病勢日增一日間強起者不過兩三時耳餘皆身卧牀褥不時昏迷且臣右腿久成殘廢今左腿又復積痛一舉動全賴人扶瞻視不尊何以臨民似此形狀尚能表率羣吏而整頓地方也臣思我皇上勵精圖治逺邁唐虞無時不以吏治賢否民生休戚惓惓聖慮若臣以久病之軀耳目聾聵精神衰憊惶惑之中或不能為我皇上澄清吏治奠麗民生君恩髙厚既無由仰報而臣又何辭以謝天下也臣束髮受書父生師教鞠躬致身之義素所講明使臣一息茍延猶得為我皇上效力封疆臣即捐糜頂踵身填溝壑亦復何憾唯是臣病日篤身不足惜而任大責重一有貽誤百死何贖此臣日夜憂懼而一息不敢自寧者也伏乞皇上憐臣餘生格外垂慈恩賜罷斥另簡賢員膺此重任則臣生固銜環死當結草將世世子孫俱沐皇仁於無盡矣臣謹具奏伏乞皇上睿鑒施行康熙四十一年閏六月初十日奏奏明祈罷疏奏為微臣病實難支謹遵旨奏明仰祈睿鑒允賜罷斥事康熙四十一年八月初六日準吏部咨開湖廣總督郭奏為君恩髙厚已極微臣病勢難支伏祈聖明垂慈俯賜罷斥以全餘生事一疏七月初十日奉旨郭琇丈量地畝事尚未完著俟丈量事完日再行具奏該部知道欽此移咨到臣臣跪捧伏讀之下仰見我皇上勵精圖治宵旰不遑殷殷以吏治民生為念更不忍使臣任內事件尚有未完以致遺憾於地方也臣思臣自仕進以至今日蒙皇上格外之知既生全之復優擢之真所謂君恩之髙髙於天君恩之厚厚於地臣何從測涯際哉臣即矢竭犬馬捐糜頂踵亦何能報髙深於萬一惟是湖南丈量一事從前奉行未善致多不均經臣請以武昌道莊搢等三員督率清丈查出不均之長沙等州縣衛挨丘捲丈均平以餘補缺與額無虧士民羣集歡呼咸稱永無偏纍共沐皇恩於無疆矣業於康熙四十年四月內題明在案嗣準部咨又經取册咨送復準户部咨查各州縣丈量田地後果否俱巳清楚有無題奏之處令臣查明隨將查明丈量之後悉皆均平清楚並無應行題奏緣由於本年八月初六日具題候旨並咨部查核矣然臣連歲痰證為虐近則病勢日增時而痰壅上忡兩脅塞脹坐卧靡寧醫藥罔效勿論地方事宜涓埃未補而病體惶惑之中精神不到檢點不周其所以負我皇上之𢎞恩者將擢髮莫數其罪臣稍有人心得一日安於其位耶况楚省地處遼濶最關緊要總督統制全省所係非輕臣念我皇上神明天縱無微不燭無情不悉以臣雖年衰病廢或可勉強辦事亦不意臣之狼狽至此極也故臣之冒昧陳情一而再再而三乞憐於我皇上之前者實為地方之利害計而非為臣一身之生死計也伏懇皇上垂念封疆𢎞開天慈允賜罷斥臣料今生無由仰報而銜結之私惟永矢之生生世世矣謹具奏聞伏候敕旨康熙四十一年八月十八日奏明白回奏疏奏為遵旨明白回奏仰祈睿鑒事康熙四十一年十月初一日準吏部咨湖廣總督郭琇奏為微臣病實難支謹遵旨奏明仰祈睿鑒允賜罷斥事一疏康熙四十一年九月初九日奉旨郭琇原係有罪革職之人特旨起用授為湖廣總督初陛見時朕詢問地方情形郭琇輒奏稱楚地易治於湖南丈量田畝復言刻期可以告竣不致擾民朕之擢用郭琇原欲其經理地方綏輯兵民非為其能出大言畀以重任今丈量一事時日甚久始行題覆紅苖屢肆搶掠殺傷兵民匿不奏聞亦漫無籌畫又所屬知府揭報黃梅縣知縣李錦虧空錢糧郭琇等並不詳察即輕率題參委官署印以致百姓妄行聚衆擅閉城門初參時不能詳察百姓閉城時又不能禁戢此皆大負職掌之處凡所行俱與所言不符此等事情著郭琇一一明白回奏該部知道欽此咨移到臣欽此欽遵臣跪誦綸音惶悚無既蒙皇上不即加臣罪令臣明白回奏感激流涕謹望闕叩頭恭謝訖竊臣一介寒微至愚至陋自縣令歷任左都御史識淺才疏致多不職乃蒙聖慈特賜寬宥放歸田里於康熙三十八年內特起臣湖廣總督之職復承恩允陛見蒙皇上詢問地方情形臣思我皇上德威遐布四海升平天下晏如恭逢堯舜之世正臣竭效犬馬之時遂以楚地易治之言回奏詎自回任之後未竟一載痰症復作臣實心有餘而力未逮此臣輕言之罪何能逭也又湖南田地從前丈量因奉行未善致多不均臣涖任之時據有里民呈訴不無豪強隱漏良懦包賠臣仰體我皇上惠愛羣黎至意冒昧奏請清丈因慮有司奉行未善反藉擾民并請以武昌道莊搢衡永郴道董廷恩長沙府知府王奕曽三員督率其事周歲之內或可告竣不致擾民具奏在案於三十九年三月內準户部咨行到臣臣隨分委莊搢等三員單騎減從自裹行糧分途查丈內有善化等州縣衛原係均平毋庸察勘零陵等州縣間有數户不清止按不清各戶清查均平其有長沙等州縣衛不均田糧則挨丘捲丈以餘補缺與額無虧據各呈報士民羣集歡呼咸稱永無偏纍隨於四十年四月內具題在案於六月內準户部咨行臣將各州縣衛均平田賦數目分晰造册送部隨行據湖南布政司詳稱零陵等八州縣因間有不均之户清查均平非通邑捲丈可比毋庸造册其捲丈之長沙等二十五州縣除衡陽衡山二縣丈出田糧銀米已經造具升科册賫報其餘州縣係以有餘補不足仍與三十一年造報原額無虧是今日均平之數即三十一年造報之原額也若復行查造恐不肖有司藉名造册派費以致纍民詳請咨部免行造册等因於七月內咨覆户部在案於九月內又準户部咨行臣仍應造册隨行據布政司詳稱各州縣田糧數目均平清楚照數徵輸相安無事今若飭令造册送部勢必槩行攢造難免驚動闔邑而原無包賠不清之户反受其纍請再咨部免造等因於十一月內咨部在案又於四十一年二月內戶部咨臣照依各州縣衛所送布政司底册抄録送部隨行據都司將嶽州等五衛照依底册抄録詳賫據布政司將捲丈之長沙等二十五州縣原送司底册抄録詳賫并稱零陵等八州縣非挨丘捲丈原未取册無憑抄録各等因於六月閏六月兩次咨送户部又於閏六月內準户部咨以湖南丈量田地後果否俱已清楚有無題奏之處行臣臣隨據布都二司各查明丈量田地之後悉皆均平清楚並無應行題奏之處回覆隨於八月內咨部并具疏題明在案是湖南丈量一事以三十九年三月準咨之日計算於四十年四月內具題雖已周歲告竣惟因户部屢次駁令造册而臣據詳請免造册遂致往返駁取遲延至今此又臣疏忽之罪不能逭也至於鎮筸紅苖臣於三十八年七月十五日到任時查前任督臣有題報紅苖出擾邊民截陷辨兵一案已奉旨相機撫𠞰臣仰體皇上柔逺洪慈行令該管文武官辨多方化誨相機撫𠞰勒退截陷兵民據領兵參將朱紱等呈報被陷兵民俱巳陸續追出撫懾事竣題報在案後因鎮筸一協設在苖邊協營泛廣兵單經臣請以沅州鎮總兵移駐鎮筸彈壓嗣因總兵張大受駁兵無術題參革職蒙皇上將南陽鎮總兵雷如調補鎮筸臣不次照行該管鎮道於所屬紅苖土民加意綏輯恩威並用照會議善後事宜實力舉行勿生事滋擾勿怠忽貽誤各在案於四十年三月內有瀘塘人楊通智等之妻係兩頭羊苖人之女因索債不還捉陷勒贖遊擊沈長祿帶兵至老家寨遊巡致截陷兵丁十一名臣據報題參在案臣思苖性狡悍出沒攘竊乃其故智武昌距筸甚遙誠恐鎮將事先懈於防禦事後畏罹參罰或有隱諱文飾密行辰沅靖道查報據辰沅靖道僉事吳國士呈稱鎮筸紅苖性類犬豕攘竊為智惟在邊防將士守禦得宜不致疏懈長姦則邊境羣黎自獲寧謐然苖類繁多良頑不一沿途三百餘里苖土界址相連或有偷竊爭鬭互相勒贖猶之民間鼠牙雀角挾私報復之愚原非驚擾內地者可比實與腹地無知細民鼠竊爭訟無異此又在地方文武權其事之輕重即與之剖斷而詳結也緣奉飭行密查相應據實呈覆等因臣查鎮筸乃楚南極邊所屬紅苖與五寨筸子等土司土民比寨而居貿易結姻彼往此來鼠竊雀角事實有之誠如皇上之洞鑒也第臣愚以鎮臣道府皆蒙皇上簡用之員必能盡心料理保愛身命或可無疏懈隱匿之虞至督撫提臣職任封疆事有應查結者即行查結曷敢輕率冒瀆致煩聖慮總之臣因夙疾未痊心思志慮昏庸日甚以致邊方事務未能確訪入告上厪聖懷此臣失於覺察及漫無籌畫之罪又難逭也再黃州府知府許錫齡揭參黃梅縣知縣李錦虧空一案因李錦經徵四十年四月完半錢糧至七月尚有未完銀三千一百餘兩據司道府揭報撫臣即據揭會臣指參例應委員署事清查是否侵那民欠該縣愚民一時閉城留印不放署官進城臣隨委令武昌府知府尤汶前往撫諭著令署官上任清查錢糧如無虧空或參後全完即為題請復任而愚民執迷不悟臣思若差兵查拿勢必驚擾不寧遂令李錦暫行視事一面清查錢糧一面查拏為首聚衆之人後經查審李錦並無虧空因其居官頗優百姓愛戴題請還職仍留原任是先未經詳察即據揭會參逮百姓閉城又不能禁戢此實臣大負職掌之罪也我皇上至聖至明無微不照臣非草木具有心胸寧不思仰報君恩無奈病勢纒綿兼之南地濕熱水土不調以致心神恍惚耳目聾聵諸事廢弛貽誤地方言行相違允屬不能稱職有負特用之隆恩雖百死莫贖又復何辨伏懇聖慈立賜罷譴以為人臣之負恩不職者戒臣惟席藁待罪不勝惶懼之至緣係遵旨一一明白回奏事理字多逾格貼黃難盡伏乞皇上睿鑒施行康熙四十一年十月初六日奏據實奏陳疏奏為遵旨明白回奏仰祈睿鑒立賜罷譴事康熙四十一年十月十八日準吏部咨為特參玩愒溺職之督撫等事考功清吏司案呈奉本部送吏部抄出兵科掌印給事中宋駿業題前事康熙四十一年九月二十一日題本月二十五日奉旨這所參事情著郭琇金璽林本直雷如各明白回奏該部知道欽此相應抄録原疏移咨該督欽遵施行計抄疏一紙咨移到臣欽此竊臣質本庸愚任楚三載涓滴未報不能稱職大負聖恩巳遵前旨一一明白回奏惶悚待罪今垣臣宋駿業疏參復蒙皇上不即賜罷譴令臣明白回奏跪捧恩綸感激涕零敢不據實陳奏也夫垣臣之參臣玩愒溺職蓋由鎮筸士民叩閽一疏內敘紅苖搶掠殺傷屢行不法等語因而具疏題參是雖勦説他人之唾餘然臣返躬自問而覺垣臣之參奏誠是臣未敢以為非也蓋湖廣鎮筸一汛在楚南極邊與五寨土司同城回環皆土民邊墻舊址之外乃紅苖巢寨苖民性最狡詐攘竊為智加以五寨筸子二司土民及辰溪麻陽瀘溪溆浦各縣邊地之民性以相習姦頑平日與苖結姻交易彼往此來因而欺詐騙害爭鬭報復搶牛盜馬捉人勒贖多由姦民啓釁而擾及良善往往有之但該管文武權其事之輕重大小有應詳報題究者如前奉旨相機撫𠞰及遊擊沈長祿等遊巡不愼俱經先後會題結案者是也亦有應詳報批飭審究者亦有應該管官自行查結者實與腹地無知細民鼠竊爭訟無異故不敢輕率冒瀆宸聰妄動師旅以開邊釁也然臣職任封疆乃不能化誨邊地使苖人畏懷懾服與土民相安致有李豐等叩閽上厪聖懷是不待垣臣之疏參而臣罪亦難辭此臣之撫綏無術所當先行罷斥者也至叩閽一案巳奉旨著趙申喬等會同詳察審明具奏是紅苖情形應聽察審回奏上請廟謨再垣臣參臣向騖虛聲近益衰廢臣思臣自縣令以至行取濫厠朝班且蒙我皇上不次優擢詎臣賦性愚直才識疏淺多不稱職罪已莫贖乃又蒙我皇上包容寬宥於康熙三十八年復特旨起用此臣之一身自始及終俱係我皇上髙厚深恩以致有今日臣尚不能仰酬於萬一是可徵臣原無虛聲又何虛聲之可騖至謂臣近益衰廢則果如垣臣之言蓋臣年已六十有五痰證纒綿日甚一日精神委屬不及思慮委有不周况楚省幅員廣濶邊方軍務即才力精健者亦惴惴乎曠職之是懼臣以殘疾之軀肩此重任猶謂能不貽誤地方臣亦未敢自信此臣之尸位無用又當即行罷斥者也總之諸凡廢弛漫無籌畫皆臣一人病之所致有負特用之隆恩伏懇皇上俯允垣臣所奏將臣立賜罷斥另選賢員接任則欽差到彼察審官民亦無瞻顧隱飾之嫌並請敕部擬臣之罪以為人臣之溺職者戒而接任之臣亦知所警惕矣臣不勝惶懼待命之至謹遵旨明白回奏字多逾格貼黃難盡伏乞皇上睿鑒施行康熙四十一年十月二十日奏華野疏稿卷五
