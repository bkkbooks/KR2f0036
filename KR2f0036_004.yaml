body:
  text: 華野疏稿卷四湖廣總督郭琇撰衰病告休疏奏為微臣衰朽日甚病勢愈沈惟恐貽誤封疆伏祈聖恩俯賜罷斥另委賢員以膺重任事竊念臣一介寒賤至愚至陋七年外吏蒙特旨行取拔置言路不二載間破例超擢至左都御史後因臣不職又蒙皇上特賜寬宥免臣之罪臣何人斯受恩至此及臣十載田間杜門自守復於前嵗六月間聞命自天恩出望外特起臣總督湖廣之職是臣自筮仕以迄今日隆恩異數哀矜生全皆出自聖裁則凡受我皇上格外之知遇者無與臣比但臣年邁力衰前承恩陛見已將臣病面行陳奏蒙皇上以不服水土慰問再三臣祇命之下不勝感激涕零既到任所因思矢竭犬馬勉供驅䇿仰答髙厚於萬一不意臣病已經數載時時舉發且年逾六旬血氣既衰則病覺愈沈去嵗自秋徂冬心忡不已及交冬至手足麻木不思飲食然尚能勉強支持至立春以後積痰上壅頭暈目昏步履維艱甚至語言亦多恍惚病勢纒綿醫藥罔效臣思鞠躬盡瘁死而後已自屬臣子常分但念全楚何地總督何官必須年力健壯智慮精明方克統屬文武彈壓地方似臣年邁病朽之人軀頽步艱既不可肅羣寮之觀瞻而髦及智昏又何能為一方之表率是臣一已之身命不足惜而貽悮於朝廷之封疆則關係非輕也況臣子年未十齡家無成丁倘臣倏忽命殞骸骨必不復歸故里臣蒙皇上豢養三十餘載受恩最深故敢披瀝陳情哀懇洪慈憐臣孤蹤允賜罷斥另簡賢能膺此重任俾臣得回籍調理或不即填溝壑食息尚延則有生之日皆我皇上之賜將生生世世永戴聖恩于無既矣臣職所應辦事務不能卧理恐致有誤謹將總督關防一顆王令旗牌十面杆於正月十七日委湖北驛鹽道參議張士伋交湖廣巡撫年遐齡暫為代理不勝惶懼待命臣以犬馬衰疾圖報無由哀切上陳字多逾格貼黃難盡未敢另繕伏祈皇上慈鑒施行康熙四十年正月十七日題二月初七日奉旨卿才品優長簡任總督正資料理著照舊供職不必以衰病求罷該部知道謝恩受印疏題為恭謝天恩暨微臣接印受事日期仰祈睿鑒事康熙四十年二月二十七日準署理湖廣總督印務撫臣年遐齡咨送吏部咨文一件內開湖廣總督郭琇題為微臣衰朽等事一疏奉旨卿才品優長簡任總督正資料理著照舊供職不必以衰病求罷該部知道欽此相應仍咨該督知照欽遵施行等因到臣準此并準撫臣咨為移送事差委湖北驛傳鹽法道參議張士伋臣標中軍副將張文定捧齎欽頒總督關防一顆王令旗牌十面副書吏文卷等項到臣并據署理湖北布政司事驛傳鹽法道參議張士伋呈齎前收貯臣坐名敕書一道各等因到臣臣于即日恭設香案望闕叩頭謝恩祇領受事外伏念臣一介寒微幸際皇上隆恩異數曠古無比臣身非草木具有心胸寧不知感激奮勵以思圖報君恩前月陳情乞休者實以久病纒綿誠恐有誤封疆重寄也復蒙聖度優容不加譴斥溫旨慰留臣聞命之下涕泗交流感懼無措臣即粉身碎骨亦何能仰酬萬一唯臣久病之軀氣血既衰右腿殘廢耳目漸成聾聵臣不勝日夜祇惕然捧誦聖言俯察臣躬從無寸效堪以報稱倘臣犬馬之疾醫藥調治或不至即填溝壑自當勉供厥職益矢精白以上報我皇上知遇𢎞恩但蚊負之懼恐致有悮臣故不敢不時切惴惴耳所有微臣于康熙四十年二月二十七日接印受事日期謹恭疏題報伏祈皇上睿鑒施行保授郡丞疏題為省會衝劇郡丞員鈌仰請睿鑒擇能員以兼職掌事竊惟楚疆接攘秦蜀黔粵襟聨吳豫而武昌為省會重地實數省水路通衢五方雜處舟楫輪蹄往來如織其間良姦混雜猝難辨别臣自涖任以來屢嚴飭府縣有司申嚴保甲以靖地方然保甲之法僅可行之城廂閭巷而客旅江干浮蹤靡定者能保無姦宄之徒潛寓其中也雖府縣身膺地方之責各有錢穀刑名事務紛煩詎能分身四應如全委之營汛恐滋生事擾民臣每深防姦於微之慮反覆籌畫往時設有江防同知一貟駐劄漢口久奉裁去此已無庸更議復設夫武昌與漢口兩岸對峙共此一江臣思武昌府清軍水利同知職掌頗間似可兼江防之任臣愚以為自今請改為江防理事清軍水利同知官不煩于另設事有可以兼舉清釐地方専其責成庶可免貽誤之虞且遇有往來旗人犯事詞件並荆州將軍衙門咨查檔案併令専管料理似為妥便但官仍此官而任有兼攝職掌匪易必須能幹練達滿漢兼通之貟方克勝任今武昌同知何勳已升任員缺查有臣衙門筆帖式圖納辦事勤敏操行端方熟識漢文才能可任且供職已歷十有二年諳悉楚省地方情形若以之補授武昌同知允屬人地相宜也或蒙皇上另簡賢員俾授此職亦統出自聖裁臣伏查外省同知無題補滿洲人員之例顧值此四海一家之盛世我皇上宵旰勤民惟期得人而理則亦何分滿漢臣查江南清江浦理事同知係奉旨補授滿員再查山西太原府通判係奉旨改補滿員臣因綢繆地方起見謹援二省之例會同撫臣年遐齡合詞具疏保題如臣言可採所有同知關防應擬添江防理事字樣臣當另疏題請換給伏祈皇上睿鑒敕部議覆施行保補道員疏題為荆楚地方緊要道員經理需才仰體宸衷為地擇人特疏保題懇祈睿鑒事臣蒙皇上隆恩總理楚省髙天厚地捐靡難酬惟有於地方事宜官員職守殫心籌畫期於萬有一裨是以每有所見敬抒下悃次第入告矣兹查荆州居楚上遊扼川蜀滇黔之衝滿洲將軍駐防其地設有上荆南道分巡荆州安陸德安三府實關至要向因駐防滿營糧餉未有專員管理俱發知府支放其酌撥動用必由督撫藩司相隔九百餘里往返動經旬日所以駐防荆州將軍有督撫內移駐一貟之請臣恭閲邸抄見有撥銀十萬兩交與荆州駐劄道員之旨仰見我皇上睿慮周詳無微不照臣思荆州駐防既於省城隔逺管理糧餉必須切近専員今既撥銀十萬兩交與巡荆道管理則滿營每年糧餉俱應歸併收放又向年奉旨截留運秦漕米內將九萬六千餘石遞年易換南米現在收貯荆倉亦應歸併管理庶責成得専又查武昌道員駐劄省城分守武昌漢陽黃州三府界連江南江西河南湖南北諸郡上接洞庭中臨大江為漢沔湘川交滙數省通衢五方雜處稽察水陸汛防消弭姦宄為全楚保障經畫務期盡善臣前請將安陸通判移駐新堤又請將武昌同知兼理江防皆防姦于微之意而提綱挈領尤賴道員控制下流彈壓重地庶得措置有方此二道者職掌甚重均為要缺必須廉能勤幹之員方克勝任現今巡荆道員缺雖升補有人尚未到任未知其人之能與否武昌道莊搢內升員缺尚未銓補臣查武昌府知府尤汶荆州府知府魏勷此二員居官廉明辦事勤敏洵稱才守兼優臣於大計之期會同保題在案若將此二員以之補授此二缺則是於地方之情形事勢諳練已久駕輕就熟實為人地相宜也雖湖省道員無坐名保題之例但臣從道員職守起見一則為糧餉之責成綦重一則為要地之綏輯匪易惟期地方有益既有可用之能員又何敢知而不舉有負以人事君之義臣謹會同湖廣撫臣年遐齡合詞保題伏祈皇上乾斷破格俯允敕令二員赴京引見親為簡試應否分缺升授恭候聖裁抑臣等更有請者湖南近苗州縣現有調補之例湖北雖屬腹地但沔陽荆門江陵二州一縣地界江湖民多刁健節年錢糧拖欠未清歷年奏銷處分有案官斯土者視為畏途傳舍諸事每致頺廢臣等再四籌維懇請皇上或照山陜官員缺出部臣恭請特簡賢能補授或聽臣等於本省內選擇賢員調補事關地方理合一併陳明統祈皇上睿鑒施行康熙四十年五月十二日題請遵成例疏題為虧空之題參太迫官民之貽纍無窮請仍遵奏銷察核之成例以定催科之期以紓小民之力事竊惟錢糧五月完半十月全完載在令甲成憲昭然近準吏部等衙門會覆科臣陳黃永條奏查參虧空一疏凡一應錢糧遇完半全完之期解不及額者即行參處仍令核明侵那實據題參不得含糊用是侵是那審明具題等語奉旨欽遵移咨到臣臣當即通飭司府州縣遵行在案但臣再四思維立法防姦誠屬至當而奉行不善其害難言蓋就一省而言除真正富庶之州縣與錢糧甚少之州縣方能按期而完其餘錢糧繁多催科維艱所謂五月者大約延至八月以後十月者大約延至次年奏銷以前且四月雖曰麥秋九月雖曰登穀第仲夏之時小民方事播種孟冬之候田間正在滌場而遽責其及時輸賦賣絲賣榖剜肉醫瘡誠可憫傷況土地不同氣候亦異湖湘之間種麥甚鮮五月之時正屬農忙留心民事之官此時原在停徴以盈千纍萬之錢糧而取盈額數於一時有司止顧考成不顧民命追呼之急如星如火稍有不前敲撲橫加以致稱貸無門秋成失望因而户口逃亡田地荒蕪者有之其為民害可勝言哉至所謂查參虧空者全憑司府之揭報司府之揭報亦止可查徴簿之多寡徴多解少即為虧空其是侵是那必經審明而後可定蓋此官既有虧空題參之後即行摘印委官署理然後按籍而稽訊其根底參以證佐而為侵為那始可定擬今若以未經摘印之先遽期查明核定侵那則被查之員印篆在手何難改換册籍虛揑欵項或稱小民拖欠勢必調停掩飾是以杜弊之意反為叢弊之階也臣愚以為五月而即參完半之虧空十月而即參全完之虧空百姓必至受無窮之敲撲未摘印而先查何者是侵何者是那上官必不能得其確實是為官民交病而究竟於國帑無裨益也莫若仍遵成例凡州縣官有虧空等弊一經察出即行題參不必限定五月十月之期而總稽完欠務於奏銷之前如有隱諱治以通同之罪彼亦無辭至其是否侵那必行嚴審務得確據以定爰書況近日直𨽻撫臣李光地一疏其於承審虧空之處分已極其嚴峻孰肯以自已之功名身家與人為殉臣之為此言者非不重國帑也非有曲庇於州縣官也誠恐追呼過急民命堪憐查核過早朦蔽益甚其為纍更大耳臣七年外吏十載家居民情吏弊知之最悉故敢直陳於我皇上之前如果臣言可採伏祈皇上睿鑒敕部議覆施行遵旨回奏疏奏為遵旨明白回奏事康熙四十年十月初七日準吏部咨為特參知府挾私揭參督撫失察請究弊源以清朦混事內開協理江南道事額外試監察御史左必蕃題前事本年九月初八日題本月十五日奉旨這所參事情著郭琇年遐齡各行明白回奏餘著察議具奏該部知道欽此到臣準此竊臣一介迂儒至愚至陋蒙皇上隆恩不次顯擢拔自田間補授今職臣祇事以來日夜兢惕常懼隕越有負報稱兹因湖北布政使任風厚據黃州府知府許錫齡揭參黃梅縣知縣李錦虧空一案致臺臣以失察指參蒙皇上不即加處分令臣明白回奏捧誦恩綸感悚無地伏查州縣錢糧戶部定例四月完半九月全完凡有司府揭報虧空督撫例應題參解任查究而後知其為侵為那或為民欠也黃梅令李錦其虧空完半之數於七月內撫臣年遐齡方據揭與臣會疏題參其是否侵那民欠尚未清查而臺臣疏稱本年完半之數尚過未久安知不欠在民竊思兵餉急需司府催解完半之時自五月以至七月歷日不為不久矣如果欠在民該縣何難具詳一紙報明上官何遲至參後臺臣乃以安知不欠在民代為申辨乎至若司據府詳報稱黃梅縣民閉城抗拒不令署事官進城不放摘印官出城又據程騏出首為報明杜禍事詞稱有縣主素所寵用之城長鄉勇以及投拜門生等閉城圍官在玉皇閣起事見工房張經匱書張𢎞選差頭藍旭捕役蔡節等持銀二百兩雇人保留現在絡繹赴省等語臣思楚俗素稱刁悍今如此行徑委官不得出入良民不獲貿易將一城內外斷絶往來關係匪輕臣公同酌議因委武昌府知府尤汶星往曉諭謂爾等令署官進城清查錢糧如無虧空或參後全完即為題請復任詎意閉城如故而夥衆之要挾聲勢似若叛然臣再三思維倘不於斯時姑從權宜勢必差兵查拏驚擾地方貽纍滋深仰體皇上息事寧民至意所以有暫請李令視事之疏一面示諭聚衆解散安業一面清算錢糧有無虧空并詳查為首行賄聚衆之姦徒也今臺臣以為臨涖之體不當如是且謂保留之人既可賄買出首之人獨不可疑為許錫齡之賄買乎又謂督撫既不能細察於前至百姓不服指為賄買保留代為文飾於後等語自臣觀之是皆臺臣身居事外之言耳設使臺臣易地而處見司府詳報程騏之出首謂縣官之寵用有人行賄之衙役有名持銀有數起事有地聚衆閉城抗拒若叛值此之際而臺臣猶必曰若令原令視事非長官臨涖之體也將任其閉城置之不論乎抑差兵查拿乎題請暫令視事而後為查究乎如謂宜參知府之妄行揭報方不為之文飾第思虧空尚未查明將以何者為憑而參其妄揭乎如謂程騏之出首疑為知府之賄買第思出首者之口供鑿鑿有據而知府之賄買無憑若以可疑二字懸擬題參冒瀆天聽臺臣言之則可而非臣之所敢也總之此一案其虧空之有無賄買之真否必俟審明而後定臣前疏業已請查究其中或李錦之果有虧空或知府之妄行捏報或閉城之衆係李錦賄買或出首之人係知府賄買其罪各有所歸也倘查究之後臣等不為據實糾參咎亦何辭但未經審明之先而臺臣即以懸擬之詞指為失察殊不思懸擬之風一倡則天下事無不可以懸擬而得將在外督撫尚敢參一官建一議乎我皇上至聖至明無微不照其中情事自難逃皇上之洞鑒也第臣賦性愚直以致言官指參蓋因舊疾纒綿衰朽日甚精力委屬不及惟祈皇上乾斷即賜罷斥另簡賢貟膺此重任免致貽誤地方則臣之銜結當生生世世矣臣緣遵旨明白回奏字多逾格貼黃難盡伏乞睿鑒俯賜全覽施行謹具奏聞伏候敕旨再疏告休疏奏為微臣病廢衰朽日甚舊疾復作委難供職不得不再懇天恩允賜罷黜事竊臣一介庸儒疊蒙皇上異數隆恩屢擢顯職至矣極矣臣幸際聖明之世遭逢堯舜之君即粉身碎骨亦不能仰報萬一而再疏求去臣稍有人心何遽至此第臣年已六十有四病勢纒綿匪朝伊夕氣鬱痰壅遂成痼疾數年來一逢節至無不感發但有輕重不同耳惟去嵗交春之前氣逆上忡痰積上塞兩腋膨脹如萬刃攢心晝夜號痛者數日因而右腿積痛竟成殘廢臣時以封疆關係具奏乞休乃復蒙溫旨慰留且以才品優長加臣之身臣何人斯受皇上之寵遇辱皇上之褒嘉伏枕自思感激涕零幸而醫藥調理病勢稍覺痊減因復遵旨勉供厥職臣自分犬馬捐縻以報臣之分也實臣之心也詎臣氣血衰枯今嵗自夏徂秋南方炎蒸水土不調感冒暑氣猶然心忡不已至九月二十三日大感嘔吐昏瞶者二晝夜逮交冬後餘痰上攻新痰舊證連綿交纒時卧牀褥益覺委頓伏念我皇上勵精圖治逺過唐虞尤加意吏治民生凡直省督撫缺出悉由睿裁慎簡其人無非為保障地方撫綏兆民計也若臣自蒞任楚地已逾二載識短才庸愧無寸長堪圖報稱既不能副我皇上委任至意今復身遘重疾目漸昏眊耳又重聽右腿久成殘廢即喘息猶存而形神已離尚乃坐擁髙職將上而寮屬下而軍民睹此頺然聾瞶之狀瞻視之下不幾褻體統而羞當世士哉況楚省幅員廣闊邊疆之軍防郡邑之利弊官吏之賢否統於督臣是問此即才力精健思慮深長者猶凜凜乎曠職之是懼也而顧可委之衰朽病廢之人乎且所到臣衙門事件非關國計即係民生以臣久病之軀精神恍惚耳目又復瞇塞倘有該屬之姦吏舞文本管之積役玩法一有不檢致干國典於此之時皇上即憐臣恤臣思欲全臣而煌煌令甲欲不戮及臣身而不可得然戮臣之身足蔽貽誤之辜臣之一身亦何足惜第事關重大雖萬戮臣身究何能贖貽誤之愆也思及于此臣尚可一日安于斯位哉若使臣貪職戀爵諱言病廢不思封疆重寄是益負我皇上知遇洪恩臣罪滋大此臣之私心惴惴日夜靡寧而不得不再為哀鳴也伏懇皇上念封疆所係匪輕病廢如臣委難卧理允賜罷斥另簡賢員膺此重任則臣犬馬銜結之私縱今生無由仰酬聖恩惟願誓之再生圖報于生生世世矣臣因陳情迫切字多逾格貼黃難盡伏祈皇上睿鑒施行不勝惶懼待命之至為此具本謹具奏聞伏候敕旨康熙四十年十月十八日奏奉旨卿才品優長簡任總督正資料理著照舊供職不必以衰病求罷該部知道原情具題疏題為瀝血哀鳴等事康熙四十年十月二十二日準兵部咨開該本部覆雲貴總督巴題前事內稱官斌叩閽一案湖廣係原案發覺之地當日領兵之官同在彼處必有真知灼見請敕發湖廣督臣提取王世清等與官斌質審情節自明奉旨這事情著郭琇審明具奏欽此欽遵并發原案到臣臣隨一面檄發湖南按察司提審外臣細查部發案卷知賊首黃明盤踞廣西産洞時三省會拏既經擒獲彼此攘奪爭功事自有之然廣西通判王世清遊擊田國璽等與貴州將辨官斌等既有公報公拿之印文乃又有官斌搶奪之密稟是王世清等以為黃明既在本省汛地今同黔將拿出其功似在黔而不在粵矣故具此密稟希為居功之地殊不知會拿黃明之時止計黃明之獲與不獲耳其功之有無應在於以前各官失察與不失察原不計及于此際也在官斌以為黔粵將領協力擒賊現有公報印文而審官不以印文為憑又不俟行提到案對質止移取口供遂擬官斌搶奪是真因干部議革職是官斌無功而有過所以激而為叩閽之舉也臣思搶奪一事固失軍紀自應查明第推其心無非一時邀功之計似與失機縱賊者不同況逆賊黃明久經正法止因兩省將辨爭功藤葛至今懸案三載未經質明其拖纍官犯相隔三省往返程途多或萬有餘里少者亦七八千里﨑嶇道路拖纍無窮且其中有經别案革職者有經革職回籍者甚有死亡不存者欲令提齊對質非動經年月恐未能一時清結也臣愚以為此案如係失機縱賊罪不容赦亦屬自罹之咎何足為惜至若官斌即使審明搶奪果真亦不過為邀功之私乃出師將辨之常念耳原事推情似亦無大過而懸案逾年拖纍多人誠為可憫伏思我皇上聖德如天宥愆赦過無不覆幬或將官斌復還原職以彰我皇上使過之仁仍敕令赴部引見試其技勇果有可採俾之效力邊方必克鼓勵自奮益竭駑駘而未結之案得免拖纍即人人沐皇仁於無盡矣臣敢特疏題請寬恩出自聖裁倘蒙俞允臣仍將部發質審原案繳部查銷臣謹具題伏祈皇上睿鑒施行康熙四十年十一月初六日題奉旨官斌著復還原職該部知道奉敕薦賢疏奏為欽奉上諭事康熙四十年十一月初十日準兵部送到內閣公文一角內開十月二十五日大學士伊桑阿馬竒吳琠熊賜履學士辛保傳申來道范承烈曹鑑倫面奉旨著行文與總督郭琇張鵬翮桑格華顯巡撫彭鵬李光地噶禮徐潮將伊等所屬地方道員以下知縣以上官員內勿論因事故降級罰俸有品行清廉實心愛民者著寫摺齎送內閣若别省官員內有伊等真知灼見者亦著開列齎送為此移咨前去等因到臣奉此臣恭惟我皇上勵精圖治宵旰不遑殷殷以吏治民生為念一時循良之盛卓越千古三代以來未之有也乃聖不自聖安益求安猶以各地方品行清廉實心愛民之員下詢臣等捧誦聖諭仰見我皇上視民如傷孜孜不已之盛心也至臣一介庸愚辦事楚中愧無報稱惟於所屬之員上自監司下逮郡牧時時以清廉二字面加勸諭又於逺屬各官悉心體訪詳行申飭務期吏稱其職民安其業以無負我皇上簡任司牧愛養元元之意但其中循分守職照常供事所在多有而求其品行清廉實心愛民如聖諭所及者實以未能多見然據臣平素之所見聞如武昌府知府尤汶荆州府知府魏勷正已率屬廉明任事前於計典內臣已會疏題薦但其任值繁劇參罰殊多故限於成例部覆未允今承聖諭諄切不計參罰此二員者可稱品行清廉實心愛民者也他如才守兼優不負其職者如湖北糧儲道參政張聖佐涖任以來革除夙弊操行端方軍民感悅其署按察司事案無留牘苞苴不入而廉明之聲著聞于口碑嘉魚縣知縣蔣斆廉潔存心寬和為政寓撫字于催科而百姓感戴又逺安縣知縣梁鳯翔才能敏練兼知自守名稱素著及署理江陵縣任事未幾而能清纍年未清之錢糧一時民情鼓舞爭先完納是足徴其操存之不茍矣再湖南沅州知州包太隆地屬邊境歷來鎮協駐劄撫綏良難而愛養民力不事煩苛至其和輯士卒令兵民相安尤為羣情之所推服以上六貟卓卓表見皆有實政以及民者也夫湖之南北其守牧縣令才守可挹者亦自有人然或新任未久或調補苗邊其廉能之實迹尚當徐俟以觀其成效至若他省清正之員臣雖問有風聞知之未確何得冒昧入陳惟臣屬諸貟係臣素所體訪者緣今欽奉聖諭不敢不據實上聞伏祈皇上睿鑒施行康熙四十年十一月十六日摺奏再疏奏謝疏奏為恭謝天恩事康熙四十年十一月二十八日準吏部咨開考功清吏司案呈查得湖廣總督郭琇奏為微臣病廢衰朽日甚舊疾復作委難供職不得不再懇天恩允賜罷黜事一疏康熙四十年十一月初八日奉旨卿才品優長簡任總督正資料理著照舊供職不必以衰病求罷該部知道欽此移咨到臣準此臣隨恭設香案望闕叩頭謝恩訖竊臣一介庸迂躬逢盛世荷蒙皇上隆恩拔自田間卑以封疆重寄臣雖才識疏庸際兹異數敢不竭厥駑駘以圖報稱然以犬馬齒迫氣血衰頽老病百出是以於康熙四十年正月內具有微臣衰朽日甚等事一疏乞賜罷黜蒙我皇上優容溫旨慰留仰戴髙厚夙夜負慙期于鞠躬盡瘁或可少報萬一其如病勢日增形神俱離實恐貽誤封疆致負君恩只得再疏求去又蒙溫旨以臣才品優長簡任總督正資料理著照舊供職不必以衰病求罷臣捧讀之下感激涕零回思臣之一身自頂及踵皆沐皇上生成膺兹格外知遇之恩臣即木石亦思報效況臣粗識大義具有心胸曷敢顧惜自愛以罹重愆倘繼此以往仰賴聖恩醫藥奏效殘喘暫延唯有誓竭餘生以酬殊遇但恐久病之軀精力頺廢其於一切吏治民生不無昏瞶此又臣之所朝夕惴惴者耳臣謹恭疏奏謝伏乞皇上睿鑒施行康熙四十年十二月初二奏奉旨覽卿奏謝知道了該部知道華野疏稿卷四
