body:
  text: 華野疏稿巻三湖廣總督郭琇撰辨白寃誣疏奏為微臣祖父之􅁈不辨則不忠不白則不孝仰祈睿照以完臣節以正國體事恭惟我皇上至仁大孝凡繼述之隆尊養之盛無不度越千古臣一介豎儒前倖叨錫𩔖之典榮膺三代之封存歿啣恩感刻無地矣兼之皇恩深重屢邀不次之擢臣思無以為報惟期知無不言言無不盡或可稍酬聖恩於萬一耳因而讒搆交興四處吹求即莫須有事便思羅織適有江南查㕘兵糧一案發臣質對其詭計閃爍枉法煆煉罄竹難述君門萬里以致孤蹤莫告幸聖主當陽洞悉其誣特㫖寛免臣罪是臣餘生之年皆皇上矜全之所賜也臣復何辨今且不以臣為庸劣補授湖廣總督臣跪捧上諭讀至謂臣前任吳江縣居官甚優最清不覺泣痛搶地數十年之寃抑向而寄諸覆盆者今忽騰出雲霄矣臣雖肝腦塗地復有何贅獨是康熈二十九年山東巡撫佛倫因發臣押送江南遂借風生波誣捏多端臣不敢一一凟辨仰煩天聽惟㕘臣係郭爾標之子過繼臣父郭爾印係故明御史黄宗昌之家僕改名討封使其事稍渉風影不惟玷辱王章抑且欺罔聖明臣雖萬死何足以盡其辜然臣本生父郭景昌係即墨縣學庠生郭爾標乃隻身光棍横賭街坊為宗族之所不齒並無妻室何有子嗣因而投充宗昌家僕是闔邑之所共知者當爾標甲申作亂之時臣方七齡本生祖郭文耀被爾標􅃤害臣父攜臣避難於文登縣宋村集後爾標被柯永盛拏獲正法臣父與臣順治三年始得回籍時臣已九歲臣伯父郭爾印乏子過繼臣承嗣本生父於是年九月内病故過繼父於康熈十五年正月内病故有丁艱呈詞可查是事跡之彰明較著者也况臣生父與爾標固係逺族即臣過繼父與彼亦係逺堂各有宗譜支𣲖又何能掩人耳目夫爾標乃殺祖不共之仇人而誣臣為之子其痛心尚忍言哉語云求忠臣於孝子之門倘臣隠忍不言而使祖父含寃於地下則不孝之罪通於天矣是臣不得為孝子又焉得為忠臣我皇上以孝治天下又安取此不忠不孝之人而用之哉臣故不得不辨不敢不白也前臣䝉恩休致囬籍大學士伊桑阿奉㫖著無人處問臣是皇上聖明必洞鑒其造謀隂陷猶不忍臣顯受其辱有傷國體臣感激流涕已曽據實奏明矣如臣果係爾標之子宗昌之僕現有宗昌嫡孫黄貞晉一問即明不知佛倫何所聞而無影無稽誣臣欺君冐認祖父濫膺封典即擬行革職追奪誥命部覆不俟行查遂依様葫蘆先立時追繳矣臣今日之辨白非敢為挾私報復之計但此乃臣生平大節所係國家體統所關抱寃十載臣死不甘心伏祈皇上勅問佛倫當日誣臣事件或係訪聞或係告發必有其人提來臣與質對事若有據則臣今日之辨白俱屬支飾是欺君之罪在臣而不在佛倫矣事若無稽而止徒挾私虚誑罵臣辱臣不顧國體之謂何是欺君之罪不在臣而在佛倫矣即或不在佛倫亦在同與造謀之人當必不屬之臣矣仰懇乾斷勅察明白討發封誥以完臣節以正國體俾存殁不至含寃臣當捐驅殞生世世犬馬啣結無巳也臣情激辨寃悲憤直陳字多逾格貼黄難盡未敢另繕伏祈皇上睿鑒俯賜全覽施行謹奏請勅㫖康熈三十九年正月二十八日奏二月初三日奉㫖該部議奏吏部議覆據大學士供稱我訪聞郭琇之父名字與郭爾標名字相𩔖今郭琇既稱伊父名字並不是郭爾標想必不是我如何得知我據訪聞具題我並無别供等語佛倫前疏係訪聞題㕘並無實據應將前所追郭琇誥命給還應掲送内閣照所追誥命繕冩給發其不行查明具題之原任山東巡撫今任大學士佛倫及不詳查即照所㕘議覆追奪誥命臣部之原任侍即沙海李振裕索諾和司官鍾儀傑蘇赫納白良瓚李雲㑹理應查議但事在赦前相應免議其原任尚書卾爾多張士甄侍郎趙士麟已經病故無庸議奉㫖依議條陳三事疏奏為事關地方謹陳三條仰祈睿鑒事恭惟我皇上宵旰不遑軫念民瘼殷殷南顧授臣湖廣總督凡地方事務有係民生者敢不一一為我皇上陳之計開一楚地素稱澤國則百姓以堤為命毎於年終水患歲警等事案内將有無冲潰修築穏固字様造册達部又奉有堤塍冲决印河各官俱照黄河之例處分全賴該管各官實力修築髙厚以資捍禦如本年沔陽州之被水瀰漫及黄梅廣濟二縣之受鄰省湖水瀰漫雖屬水勢氾濫所致然亦地方各官修築不堅厚之故也若不嚴定處分之例無以警愓應於毎年秋成九月興修次年二月告竣如有冲潰被水漫溢者即將經修縣丞州同以及印官並原有考成督催之同知知府分别降罰留任修好開復仍令該管道員不時查察至於修堤原係照糧役夫衿監俱應一體出夫不得濫行優免庶糧少之民獲免獨受其勞而糧多之衿棍土豪不得坐受其福如有抗違包折等弊或查訪確實或被他人首告按照光棍例治罪庶管堤各官知新例可畏衿棍土豪知法紀難犯而國賦民生兩有攸賴矣一查湖北預備漕船一百隻先因吳逆變亂之後軍旗額船未足且又歲歲回遲歴年動支輕賫銀三分令各旗丁扣費七分雇覓民船應用至康熈二十一年前㕘議道章欽文議照雇覓例於各旗丁行月耗米内每石扣銀一錢并於州縣應徴漕米内每石𣲖銀一錢二分合共打造預備漕船一百隻前撫臣題准成造及此船造完而額船之數旗軍亦已造定每歲又依限回空受兌無誤歴今一十八載此船竟置勿用渟泊河干皆致朽爛無存前糧儲道董紹孔詳請咨部銷案部駁不允責令修造但查出運額船原有三修銀兩給軍修理十年復動項大造今此船隻本非動支正項係屬𣲖捐成造者既不出運又無三修大修之項已經一十八年之乆雨淋水濕日日渟泊江干以致朽爛無存今輓運船隻年年依限到次並無愆期即使此船尚存原屬無用倘若以無用之船重責修理則此船原公𣲖四萬餘金斷非一二該管官弁可以措辦勢必仍照前議扣費𣲖捐而軍民何堪此累况船毁板爛實屬無船可修無法可設即使再行𣲖造亦無需用之處不過仍前渟泊終歸朽爛而已仰請皇上睿鑒勅部銷案則軍民啣結無既矣如或額船回次偶遲責令軍丁雇覓民船北運或亦不致有誤也一苖民雜處之區如茶陵州等處調補熟識苖情官員查内有難治易治之分亦有才大才小之别未必盡能人地相宜且湖南州縣通計止六十餘缺而苖民雜處者已及其半似此苖缺甚多未必有如許可調之人倘此後選擇無勝任之員或雖能勝任而品級未當似應不拘資格借品調補仍照原衘陞轉是一通融調補庶乎地方得人至官員調補苖地其撫字之間自必倍費心力冀望奬勵伏懇皇上勅部議覆倘照邊俸陞遷俾人忘其苦累而益加奮勉亦愈可收得人之效也不則人皆甘於平常而不願為廉能矣再苖民雜處之汛防將弁有彈壓控制之責亦必得廉幹熟悉風土之員始能恩威並用安輯苖民似應照文員一例揀選調補庶文武均得其人而地方可收實效矣以上三條皆切時宜伏祈聖明睿裁俞允以安民生以靖地方臣因條陳起見字多逾格貼黄難盡未敢另繕併祈皇上俯賜全覽施行謹奏請勅㫖康熈三十九年正月二十八日奏二月初三日奉㫖該部確議具奏部覆三欵俱應如該督所題本年三月初三日題本月初五日奉㫖依議再請均賦疏奏為更名之穀折太重畧為變通賦不缺額民不受累事竊湖廣江夏等十三縣楚租更名田地乃明季下瘠之藩産盖因田瘠每歲納租穀於楚藩猶之佃户納租米於田主也年豐照收歲歉告減原非計畝定則之田可比我朝定鼎以後順治九年適遇荒歲穀價騰貴毎石遂至折價銀四錢六分零較之民糧科則加重至六七倍在彼時不過因價昻而論豈可不問豐歉執為定例使佃種窮民竭終歲之胼胝莫供一歲之輸將稍有拖欠又迫於追比而士民紛紛告苦告累叠據布政司並各縣請照民田一例改折徴糧情由詳報等因臣隨查此項藩産若照民田輸賦固致正額有虧應照各縣上則田地起科合筭共銀四千餘兩尚餘銀六千餘兩仍於十三縣田内照數均攤每畝所加不過釐毫最輕易辦實無減國課臣於康熈三十八年九月内為仰請皇仁等事㑹疏具題部覆前項更名田地原係明季藩産給民播種輸租非民間自置田地可比故與民田應徴科則較多且輸租田地各省俱有此項刋載全書遵行已乆不便更張應將所題之處毋容議等因竊思此項田地雖係明季撥為藩産給民播種實乃版圖之疆土佃民納穀無異按則納糧自應與民賦一例輸將况任土作貢已乆即非自置田地而同為力事􅅵畝之民輸納獨有偏重恐愚夫愚婦始而顒望蘇息今則見其困無底止勢難免其流亡且經撫臣年遐齡咨詢鄰省一准偏沅咨覆湖南所屬藩産與民田一例起科從無租穀折價事例一准河南咨覆豫省更名田地總係比照民賦一例徴收輸納較之民賦並無輕重懸殊一准山東咨覆東省租穀田畝並無折價之例見今俱係按畝徴銀一准江西咨覆江省藩産應納錢糧俱係按畝輸將並無更名藩産租穀折價一准山西咨覆太原所屬藩産更名田畝悉照全書科則徴收並無折價之例一准陜西咨覆陜西明季藩産更名田畝向來俱照原租徴收並無租穀折價事例至康熈三十六年奉㫖均平民無偏輕偏重之嫌是各省藩産更名田地俱照全書按畝分别輸賦並無折價重累則湖北同一藩産之更名田地何堪輕重懸殊我皇上愛育民生屢下蠲租減賦之詔惟恐一夫不獲當此時際雍熈民歌樂利而又欽頒上諭為民興利除害誠千載一時之遇而楚民有重困不得不仰祈皇恩勅部將此項折價田畝照民地上則輸賦其餘仍於十三縣田内照數均攤是稍為變通轉移而國課無虧小民數十年之積困一旦獲甦無復呼籲之累永戴皇恩於無既矣伏祈睿鑒施行謹奏請勅㫖康熈三十九年正月二十八日奏二月初三日奉㫖該部確議具奏部覆謂此項田地各省輕重不一俱照全書所載數目徴收况將此地租照地租民田上則輸銀四千兩其餘六千兩於十三縣民田内均攤其十三縣自置田糧外又行加増反致偏苦受累應將該督所請毋容議康熈三十九年二月初三日題本月二十七日折本奉㫖這更名地租照上則民田起科餘銀均攤於十三州縣徴收則十三州縣之民未種此田令其納銀恐致民怨這所奏未協於中著筆帖式前往問郭琇將伊所見明白冩摺子即付筆帖式帶回具奏三請均賦疏奏為欽奉上諭事康熈三十九年二月二十九日准户部咨奉㫖更名田租著筆帖式問臣明白冩摺子帶回具奏仰見我皇上愛育羣黎無微不照詳且至矣夫臣之奏請田租餘銀所應均攤者盖因百姓之佃種此田歴年銀兩徴收不完偏苦已甚或有逃亡或有荒蕪錢糧無着官云官賠而官何嘗出已之所有以代民之所無猶然取之於民究竟是民賠而官受代賠之虚名此荒蕪逃亡之貽累也又有累極不能耕種者先貸銀與人托付耕種輸課圖釋已累而種者不三四年間覺此田無利而受累又欲退還本主而本主不受乃至紛紛具控彼稱原係此人之田此稱原係彼人之田轉輾牽纒告掲不已是又耕田搆訟之貽累也臣涖任之始據布政司各縣紛詳不一俱謂此田有偏苦之累以致錢糧每歲拖欠而各縣士民呈請題達豁免臣查舊案前任督臣巳經題請部覆謂豁免則課額有虧應毋容議臣思十三縣之有更名田地者實為彼闔邑之苦累豁免有虧國賦餘銀均攤每畝不過釐毫衆擎易舉亦各縣人民之所樂輸者也况此項銀兩一有拖欠官必責成里長里長豈肯代賠必歛之於百姓一經里長科歛則每畝又不止釐毫矣故均攤亦可以省彼闔邑之苦累也臣謹具摺回奏伏祈睿鑒施行夲年三月初七日奉㫖這事情著照該督所請行請禁八弊疏奏為楚地之陋弊實甚臚列八條仰請勅㫖勒石永禁以澄吏治以安民生事恭惟我皇上勵精圖治宵旰勤勞無日不以吏治民生為念而三楚地方風俗猶未淳美民物尚未安阜者皆由官吏因循陋弊不能振刷頽廉也盖督撫藩臬監司守令雖職有尊卑皆屬臣子務期洗心滌慮共勉良圖毋養奸而滋惡毋縱蠧而殃民毋黷貨以剥民財毋濫刑以殘民命自是風行草偃大法小廉以仰荅皇上愛養元元之至意臣謹㑹同撫臣藩臬司道條議弊習之實甚者臚列八欵嚴行禁革第思臣在任之日尚能禁之於一時臣離任之後或不能禁之於他日故不憚瑣凟敢請勅㫖勒石永垂鑑誡也計開一軟擡硬駝之弊宜除也從來徴收錢糧皆當遵照定額若額外多徴即為私臟或有指稱貲費等項公然科𣲖如闔邑通里共攤同出者名曰軟擡如各里各甲輪流獨當者名曰硬駝此皆由地方豪紳劣衿及奸民惡棍專工包􅄃借此夥結有司倡此異議以為分肥撮潤之計乆而州縣衛所官吏遂為把持挾制即或官有稍知自愛者而亦不能更張悛改竟視為例所當然牢不可破以致豪劣奸棍槖肥囊盈而窮簷良懦日貧月乏是從前習弊貽累甚深故宜勒石永禁一陋規雜𣲖之多宜除也如大差大役固有因公而𣲖者乃遂有假公濟私以一𣲖十者又有每年毎節𣲖大小禮儀者而郡守之交際亦有𣲖之各屬者有府㕔縣衛所一出門𣲖中伙𣲖路費以及跟役之食用者有上官差役往來𣲖送規禮下程過客交際𣲖送贐儀酒席至起解餉銀又别立名色曰解費曰扛費若現年應役則有磕頭花紅酒席之陋例甚而至於府道亦有開徴奏銷之陋例是一邑之中私𣲖横徴竟有倍於正供者至南漕一項又有監兌下縣之規禮差人坐催之規禮道府書役之規禮且書役之科勒竟有倍於官長者嗟嗟民力幾何豈堪如此之剥索乎嗣後上下衙門各須潔已自愛革除陋習不得仍蹈前轍故宜勒石永禁一徴糧之滚單宜行也如一邑毎里之中或五户或十户立一滚單於某戶名下註明田糧若干該銀若干春應完若干秋應完若干或分作十限一限該完銀若干發給甲内首名挨次滚催令民遵照部法自封投櫃不許包户銀臣櫃役執戥稱收一限若完二限又挨次滚去如有一户沉單不完不繳查明即嚴拏究處是既省差役之滋擾又省里排之科歛且省民一分之濫費即増民一分之正供既増民一分之正供即省各官一分之考成豈不大有益於官民乎故宜勒石永行一訟棍之包攬詞訟宜禁也楚俗刁悍率以越訴為常無論户婚田土小忿角口有不由州縣而遽赴上控者有已經結案多年而忽思翻案妄控者有州縣府道業已斷明而又誣衊問官牽告衙役羅織多人以為准狀之套頭者此皆由各屬不逞之徒往來省㑹結交在省訟棍狼狽為奸遇事生風代人架捏情詞包告包准扛帮硬証而愚民無知信若神明甘心健訟往往傾家破産而不悔若庭鞫得實原告受反坐之條被告受拖累之苦而訟棍猶安然無事飽食無禍也嗣後此等訟棍務嚴行重䆒按光棍例定擬以警刁風故宜勒石永禁一酷刑濫刑之宜禁也查㭱牀一項乆經禁革近楚中各監口有一刑具名曰大鐐不論輕重罪囚凡無賄者夜俱置之於此中與㭱牀名異而實同雖謂謹防越獄起見然手鐐脚鎖項之三件犯罪重者原許並用而大鐐何為也凡監口有此者官當立刻親查嚴飭禁卒拆毁又如夾棍一項原為極刑即長有二尺以外者總為三木之下已無求而不得何須再以尺餘之夾棍為用不幾極刑之中又極刑乎至於木枷竹板輕重大小俱有定式又定例開載如有違制刑杖嚴行焚毁仍著體訪酷吏等語則一百二十觔之重枷瓦様之大板尺餘之夾棍皆當遵㫖焚毁嗣後官吏須身體力行不得陽奉隂違致干功令故宜勒石永禁一誣盗之宜嚴飭也查楚中依山帶湖固多匪𩔖為民牧者自當嚴飭捕役緝拏真盗真贓不可草率了案以致無辜含寃乃地方各官一聞失事惟慮盗難弋獲遂任捕役横行拏獲真盗者固有而誣良栽贓陷害者亦復不少如有形迹稍渉疑似及捕役素所嫌怨者公然鎖拏私行弔拷種種非刑不認不休及其屈認方始到官而官惟顧一巳之考成不問是盗之果否捕役之言深信不疑受寃之人百喙莫辨是不惟捕役之誣良竒幻叵測而官之容隠扶同亦在天理人心之外嗣後遇有此等案件而官役應按律加等議處以示警惕故宜勒石垂戒一抄搶之風宜禁也楚之為俗强凌弱衆欺寡或因鬭毆傷命未經告官屍親統衆先抄兇手之家或小忿不忍因而投繯溺水亦率扛屍抄其與口角之家甚或女嫁與人偶以别故自盡其母家亦率衆抄其壻家又江河兩岸有田之家修築堤塍逐年輪充堤長經管宜於農隙之時預為堅築乃平日互相推諉一遇横流汎濫水過於堤是非人力所能捍禦而兇横之族竟不思平日不肯齊力修築乃反以為利率衆抄搶堤頭堤長之家并及其鄰里且謬為飾詞曰不行救䕶其被搶之􅃤酷於賊刦家囊牲畜棺椁房屋樹木掃蕩一空既而皆控於官彼稱殺人掘堤此稱率衆抄搶而州縣各官姑息含糊竟不按律究擬茍且結局此輩益無忌憚故楚鄉有官法逺蠻法近之謡今後若再有犯者地方官即當嚴究律擬通詳以懲刁惡是宜勒石永禁一强族阻葬之風宜禁也楚地惡俗每遇䘮葬乃有借事生風者或賣地之人需索酒食稱賣陽不賣隂必不許葬或此地曽經管業轉賣巳經數主自稱業主需索酒食必不許葬或有田地相連欲圖買成片者或附近有墳屋者則稱碍其墳屋莫不統領多人或以糞穢洗潑其棺或扛病人强卧其穴需索者不滿其慾不止圖片者不得其地不止大抵皆强族兇徒慿恃族衆魚肉鄉懦嗣後如有强族欺壓隣里强於人家來龍白處安塟者許其具控地方官親臨騐視不得委員滋擾一騐便可剖斷是非若係統兇阻葬需索酒食圖謀地土者立刻盡法究處不得少縱庶兇悍之風可息故宜勒石永戒以上八欵兩湖員役因循已乆民生未輯毎貽聖上南顧之憂仰祈勅部行文勒石永禁即或有不肖官吏貪念復萌亦當顧石自惕且誰無身家誰無性命斷未有不仰體聖心矢志精白而猶敢悖㫖自罹法網者也則是楚俗一變雍熈成風亦可謂乆安長治之䇿焉臣因地方起見奏言甚煩貼黄難盡未敢另繕合併聲明臣謹合詞具奏伏祈皇上睿鑒施行康熈三十九年四月二十一日奏五月十七日奉㫖這本内事情前任督撫並未陳奏郭琇涖任實心除弊詳明具奏可嘉俱著照該督所請行該部知道援豁積案疏題為積案沉寃生死交累叩請援豁以廣皇仁以恤幽魂事竊照康熈三十八年十月初四日據湖北前任革職已故布政使徐惺家人徐忠呈稱蟻主一介寒儒由科員外轉監司陞選湖北布政居官六年不顧身家凛遵法紀報國維勤痛值吳逆猖狂王師進𠞰數百萬軍供盡出藩庫支辦寅呼卯應日無寧時逆賊蕩平之後追賠者若許蟻主病故復坐以侵蝕者又若許􅃤受竒寃生前忍痛死後遭汚實為楚省一大寃累前任撫部院叠次保題以軍供悉符詔欵請豁請銷有慿有據是蟻主之詿誤自屬因公不意保題之案件而又紛紜行追者不下百萬致承追府縣枉受例議迄今二三十年孤㷀家屬日不聊生即將來咨籍變追而原籍寸土全無徒滋苦累哀叩力賜援詔開豁是楚省多年累案一旦清除則隂功浩大人鬼啣恩等情遂批布政司任風厚逐案細查詳議前來臣檢查得湖廣原任革職病故布政使徐惺㕘案内虧空銀各項共銀八十一萬五百九十兩零豆八千四百三十七石零係徐惺任藩司之時正值吳逆變亂荆襄鄖岳等屬與賊對壘禁旅綠旗官兵雲集進𠞰凡取辦軍供糧餉夫船噐械難誤時刻自不拘何項錢糧動用採辦而承辦各官期無誤萬𦂳之軍需又何計事後核減刪除與夫那移虧空之追賠也然用兵地方軍供動用錢糧賠補未清已悉宸衷一於康熈二十六年五月初三日欽奉恩詔内開一自用兵以來一應動用錢糧有因原未題明不准開銷屢經核減現在追取召買價值拖欠在民變賣糧草多給兵餉及盖造營房修理軍器雇募船隻俱令賠補歴年未清者概准豁免又於康熈三十四年二月十七日欽奉恩詔内開一湖廣省制造棉簾車輛等案核減銀兩俱著豁免一各省節年未清錢糧無慿察核及官役亡故無著銀兩察明保題豁免欽遵在案是徐惺等承辦軍供動用銀兩以及在事各官役死亡殆盡正與恩詔相符歴任督撫諸臣屢經㑹疏題豁在部臣祗以錢糧為重槩未允銷行令追完報部第查此案人員司道府㕔州縣其牽累者三十餘人有歸旗回籍縁事物故不一而止現在者僅存皮骨死故者家産盡絶而徐惺亦已病故㷀㷀家屬日受血比絲毫無完承督各官徒受㕘罰無已臣思徐惺當日值軍需浩繁之時勤勞盡瘁在生巳赤貧如洗死後旅櫬難歸家屬羈囚追比情實堪憐今經二十餘載雖日事乎桁楊而終亦無益於國帑臣今㑹同撫臣年遐齡合詞保題仰懇宸衷獨斷准予豁免及銷除抵補以昭皇仁以清積案伏祈皇上睿鑒勅部議覆施行康熈三十九年五月十八日題六月十四日奉㫖該部議奏部覆查徐惺原㕘案内虧空銀八十一萬五百九十兩零豆八千四百三十七石零原任楚撫吳琠現任巡撫年遐齡曽援恩詔請豁抵銷等因保題户刑工三部㑹議以前項銀兩俱係該督撫審明徐惺侵那應追賠之項不便據題豁免仍行該撫作速追完報部可也康熈三十九年七月十三日具題本月二十日奉㫖徐惺虧空銀豆俱從寛免其追取肅清學政疏奏為試差之積弊實甚仰請睿鑒除弊清源以肅學政事恭惟我皇上右文重儒逺邁千古加意人材鄉㑹廣額凡屬士子無不感激思奮仰戴皇恩於無既也詎各省學臣肆為貪濫其流弊有不可勝言者臣得累為皇上指陳之夫學宫之設原為國家培養人材童子一試係士子進身之始三年中欽簡學臣務期拔取真材附入黌宫以儲異日之用任綦重矣乃邇來學臣一經差出即肆意妄費先負京債若干及至地方考試而習弊尤不止一端其督撫之陋例歲試每府若干科試每府若干名曰棚規而藩臬司道或例銀若干或進學若干名曰常規之二項者無不成千纍萬習弊相沿各省皆然大約督撫司道以學臣為壟斷學臣借督撫司道為䕶符而學臣復何所畏忌故考試生童線索遍滿通衢因州縣之大小定價之多寡奔競成風舉國若狂是學臣之納賄先入私囊者已十有七八矣且學臣考試俱由知府提調各知府於屬下州縣凡有賄通學道者先檢得其人及案臨之日勒不發案送考以為要挾之具學臣不得已因求調停其間每一州縣攬去二三名不等甚至州縣奔競多而價最髙者知府盡為包去一府之人號曰老爺學是府官之要挾包攬又不知幾何人兼之本地勢宦之情面京札之投託又不一而止以致芸牕寒士俱被擯落而濫入黌門者俱屬膏梁紈絝目不識丁之人將明倫一席止為錢神交易之地又安得有人材哉由是夤縁得慣浸假而買鄉科買甲科關節習熟靦然不以為怪皆由此始進之不正誤之也而更可駭者尤莫若考入武庠之一途也文童之真者尚間有一二至若武童無論州縣大小槩以賄進只縁此途不行磨勘無關聲價盡以此項充之囊槖且自行賄賣之外復有各處進士舉人之常例教官巡捕等職之恩典或二人一名一人一名俱以武生應之至中有通線索連首尾者包去三五人不等甚至書吏皂快水夫火夫之𩔖亦皆合班成羣指武生為討賞之具而縁入武庠者俱係無賴棍徒不習弓馬不諳韜畧假阿堵為䕶身之符一旦衣頂到身抗糧把持唆訟武斷率由此輩凡此諸弊孰非學臣之貪濫所致而學臣之貪濫又孰非督撫之䕶縱所使也伏祈勅部先嚴督撫之處分有勒索學臣棚規者勿論贓之得與不得一經發覺即行革職提問而司道有勒索者亦依此例夫督撫司道之處分既嚴自當嚴察學臣之賢否而無所容其貪學臣亦有所畏忌而不敢復蹈前轍以自干功令也至府官提調亦當嚴行申飭其州縣送考名數與知府送考名數俱照定額固不得掯勒以為要挾仍不得濫取以滋弊竇如知府猶然要挾濫取其送考童生有文理不通者學道試出即申詳督撫請㕘將知府革職提問如學道扶同作弊仍然冀倖賄賂者督撫訪確題㕘亦將學道革職提問此所謂㧞本塞源而各省之積弊可革也至臣所理湖廣一省更有駭人聽聞者各州縣入學名數自有正額乃正額發案之後於造冊達部時毎學三等項下揷入數名售於從未入試之棍徒名曰附案又有生員物故匿不報除或改姓或改名售人承頂者名曰鬼接頭且有以此學改入彼學售人承頂者名曰飛過海諸如此𩔖居然生員而不自以為恥臣涖任之始雖與學臣酌議俱行禁革然習弊已乆猶恐後來學臣貪念復萌并祈睿裁諭部嚴飭以前者革除勿留以後敢再有營謀者即以光棍例治罪而學臣亦以貪例加等議處是又楚省學政之習弊所宜痛懲者也總之臣職任楚地止應在楚言楚第見考試之濫觴巳極數年來咸習為固然實有負於皇上倍養人材之至意倘弗更定嚴例其積習尚可底止哉故不得不統言時弊瑣凟宸聽伏懇乾斷通行直省不咎巳往嚴懲將來則學政以清而真才必出庶幾可以端士風而收得人之效也臣因條陳起見字多逾格貼黄難盡未敢另繕惟祈睿鑒勅部議覆施行康熈三十九年五月二十二日具奏奉㫖這本說的是九卿詹事科道㑹議具奏穀米轉移疏奏為欽奉上諭事臣前䝉恩陛見皇上面諭湖廣可收米二十萬石當預於秋成時定價冩摺子先送内閣臣一時愚昧未曽啓奏是否急需今將屇秋收穫在望如米係急需臣謹有轉移之法預為奏請伏候上裁楚省之米出自湖南臣思湖南倉貯積穀甚多查歴年所積有一百萬四千八百石零夫此項榖石原為賑荒而設即遇歲歉廣行賑濟亦不過費至五十餘萬下此五十萬石不幾置之無用乎况積年太乆其榖難免腐朽雖每歲將五十萬石春出秋入以陳易新其中豈無侵漁耗費等弊臣以為此積穀五十萬石可辦米二十萬石易無用為有用以濟急需詎非至便且湖南今歲錢糧俱䝉皇恩蠲免餉銀尚撥自他省其收米價銀又不得不煩計别撥也且一時收糴米石又恐致米價騰貴何若將此一半積榖如數辦米尚留一半貯倉備賑既不乏他年濟荒之用又無煩今日撥價之勞而貯倉者出入既少亦可以省每歲腐朽之慮即穀米不敷所用臣行湖南布政司就近得以從容陸續收糴而民間不知有買米者之多又可免米價騰貴之弊斟酌轉移似屬兩便臣未敢專擅預為摺奏請㫖伏祈皇上睿鑒施行康熈三十九年六月二十二日具摺奏七月初十日奉㫖這本說的是該部確議具奏部覆應如該督所奏恭侯諭㫖遵行可也七月二十九日奉㫖依議保題標員疏題為保題標員仰請睿鑒以重職掌事伏念臣一介庸愚叨䝉聖恩格外知遇授臣湖廣總督之任臣日夜祗惕無由圖報惟思一心營職氷蘖自凛凡地方官無不留心延訪俾人地相宜庶得稍竭犬馬微力以仰荅皇恩於萬一况臣標中軍一官係諸弁首領關防内外尤不可不慎擇其人也臣標下中軍胡駿業已推陞廣東雷州副將現今來京陛見所遺員缺臣思是官有兵馬錢糧之責既當練習戎事亦須操守廉謹倘不得其人或則玩愒從事或則招揺撞歲不惟彼自玷官箴其有關於臣之職掌政非輕也臣標右營遊擊張文定因係臣同鄉故素悉其為人忠義謹慎先年隨閩督援𠞰屢効軍前破寨負傷功加左都督仍帶餘功是其技勇乆著行間也及臣涖任今經一載見其整飭營務弁兵肅靜而且矢志廉直以之補授臣標中軍亦可謂人地相宜克厥勝任者也第該將職係遊擊應否㧞補微臣未敢專擅伏祈睿裁勅部議覆倘荷俞允俟部文到日即令赴京引見得䝉皇上再為親試騐其技勇彼必奮勵供職而封疆亦可收得人之效矣為此具本謹保題請㫖康熈三十九年七月初六日題移員弭盗疏題為沔地之湖溪遼濶盗賊之發覺甚多仰請聖鑒移員分駐以專巡緝以靖盗原事竊查湖北八府先年惟鄖陽府屬之房保竹山以及荆州府屬之歸巴彛陵等州縣界聨秦蜀山川險惡最易蔵奸欽惟我皇上威德誕敷仁恩周洽罔不革面洗心共游化日光天之下桴鼔不鳴閭閻樂業矣惟有安陸府沔陽一州介居江湖之中接連洞庭包絡漢􅃆凡廣八百六十餘里袤五百四十餘里大約田疇居十之三而湖􅆜居十之七為大湖南北武岳荆襄往來孔道而新堤一帶地方如茅埠竹林灣王家堡等處皆係倚江傍湖溪港紏紛葭荻茂密村落隔越尤為盗賊出没之所更有黄朋山鍋底灣裩襠湖仙桃鎮葫蘆嘴南龍王廟等處奸宄匪𩔖潜匿尤多此輩無事則操舟四出網魚為業乗便則行刦居民剽掠客舟蹤跡詭秘去來聚散倐忽莫測近年如鄭介玉劉學寵張度徐鳳聲等各案失事俱經先後題報獲賊有案而近日發覺如蘇文逺陳五濤各案現在獲賊審擬報㕘防員且歴查從前别屬發覺盗犯又多係沔陽新堤人氏至於異鄉旅客孤舟逺渉曠邈無人之區遭害意外命畢波臣孤魂渺渺飲泣夜臺地方無由具報有司無從覺察者又不知凡幾矣臣與撫臣毎念及此寢食不寧朝夕計議屢經申飭該汛文武將吏加意巡防雖遇有失事盗多即時擒獲然䆒未能殄絶根株也夫欲靖盗之根株必須清盗之窟穴而欲清盗之窟穴必先嚴巡捕之責成查新堤一鎮戶口幾萬往來生理者皆係四方雜處之人此地雖有汛防守備一員第係武職而稽察民間保甲當不可令為專擅也且水曠千里易為大盗窟穴而兵無巡船間有警報亦唯口喊拏賊目視飛颺而已是又宜專設文官住守彈壓然思另設員役張官置吏不無煩費今查安陸府現設通判一員職司糧捕沔陽地方原屬兼轄之所况其兌收糧石不過每歲秋冬之季為日無幾是其専責全在捕盗而現任通判王良楫身係旗員年力精强才技敏練儘稱此職臣等竊計莫若將此通判移住新堤俾得就近專心巡緝特懇皇上勅部頒給安陸府捕盗通判關防一顆庶申詳文移可杜詐偽而巡防呼應不致稽延但該通判從前雖有捕盗之衘而無捕盗之實額設捕役寥寥無幾兼以長江大湖又無巡緝船隻地方遼濶遇有失事不過坐受㕘罰勢難責其追捕弋獲臣今請照直𨽻四路捕盗同知之例撥發臣標下水師營經制把總一員唬船三隻兵目三十名再撥荆州水師營唬船三隻兵目三十名共唬船六隻兵六十名把總一員俱屬該通判管轄遇有地方失事隨即跟蹤追捕務期必獲兼令晝夜巡查稽察匪𩔖俾盗賊無潜蹤之地庶􅃆陽新堤一帶居民絶鳴吠之警而各處行旅商賈並享坦道之福是一轉移間官無添設兵不増餉而於弭盗安民似乎均有裨益也臣身在地方目擊情形謹㑹同湖廣撫臣年遐齡合詞具題伏祈皇上睿鑒勅部議覆施行康熈三十九年七月二十四日具題八月十九日奉㫖該部議奏部覆允行於九月十二日奉㫖依議具陳科弊疏奏為欽奉上諭事竊照科目一途關係國家大典我皇上隆文崇儒孜孜作人之心周詳篤至真千古未有乃邇來郷㑹科塲積弊未改致煩聖慮今復檢選内閣中書臣馬喀於康熈三十九年八月初十日賫到本年七月二十四日大學士伊桑阿馬竒王熈吳琠熊賜履張英學士滿都卲穆布巢可托舒輅顧祖榮奉上諭直𨽻巡撫李光地河道總督張鵬翮湖廣總督郭琇廣西巡撫彭鵬此四人處著將該部院揀選筆帖式各遣一員限期前往將郭琇條陳學道時務鄭惟孜條陳鄉試之處經九卿㑹議事宜及禮部議覆滿普條奏科塲事件俱全抄賫往令看九卿禮部所議者得其當否若何施行方得無弊永逺稱善著各殫心詳議務期歸於盡善即具本付遣去人員賫回啟奏伊等皆居官素好行已清廉之人此事若瞻徇諸臣情面不務求盡善殫竭乃心從公議奏則伊等一生讀書制行俱有忝矣往返直𨽻限六日江南限一月湖廣限五十日廣西限七十日欽此到臣臣即至愚極陋捧讀聖諭諄切敢不殫竭乃心畧陳管見以仰副皇上下詢芻蕘之至意伏惟我皇上念考試甚屬𦂳要特諭現任大臣官員子弟另編字號另入考試睿慮髙出千古非在廷臣工所能見及者也乃廷臣議編為官字號而下及知縣守備等官臣念我皇上深思顧慮恐妨貧寒進取者在大臣子弟耳知縣守備等官亦屬微末或亦不能中通線索向京闈科塲作弊也其應編官字號者唯如垣臣慕琛奏内在京三品以上及大小京堂翰林科道吏禮二部司官在外督撫提鎮及藩臬等官其餘在京文官散職武官佐領在外文官道府州縣武官副㕘游守似不必編入其中徒取充數廷臣又議官字號毎二十巻取一巻與民巻數似相當也臣聞各省鄉試大省中式八十名其應試生員至七八千人中小省中式五六十名其應試生員至五六千人夫各省應試生員若此之多者亦以三年大比恐有遺才以故廣收多士㧞取其尤大約百巻中取一巻也今官員子弟世其家學者固多而游惰失業者亦復不少設此二十人中無一可取將强取之乎誠有如垣臣慕琛所奏者况膏粱之子未必盡勝寒牕之士乃各省生員於百巻而取一巻官員子弟反二十人而取一人此豈事之得其乎者乎臣愚以為凡編官字號者定為三十巻取一巻畧溢其數至餘巻零數照三十巻過半者仍取一巻不及一半者不取巻數多者照此算取至各省鄉試或報名止二三人以及數人者則官號可以不編及㑹試則直省舉人集數甚多亦仍編號考試是既不使有遺珠亦不致有倖得務㧞真才以光特典至若恭請皇上親試以選舉之事上煩至尊似屬不敢議者也如臺臣鄭惟孜又有監生回籍應試之奏想亦目擊近來監生積弊指陳利害愷切詳明殆有激乎其中而言之也夫科塲之弊惟北闈江浙為甚而積弊之由皆自若輩為之且若輩大半俱係内而大臣子弟外而富家紈袴或納粟或捐貢或選㧞借肄業名色僉集京師一遇試期其密謀皆關節之事往來悉線索之家包攬過付舉國若狂且内有假名士一流奔走權門獻詩獻文以盗虚聲及標榜習慣遂儼然名士自居而為試官者亦樂得其人而收之門下因而交結串通號曰名士關節然更有異者莫甚於塲後遺巻之刻也夫有不肖之子夤縁中式未遂者出塲後或倩他人代作或將舊文改竄並非塲中夲來面目乃竟借主考房官美批以為業定魁巻小疵偶遺公刻呈送恬然不以為恥因送至選坊與中式墨巻並行甚至選家濃圏極贊有逺勝墨巻數倍者不過邀此虚聲為來科梯媒故時人諺云今日之遺巻來科之元魁也似此鬼蜮伎倆治以光棍之例亦不為枉所當勅下嚴行禁絶者也臣竊計若輩咸肄業於國學之門而交結串通肆無忌憚至此而祭酒司業以及助教等官竟付之不見不聞乎臣不知監官所司何事也若輩所肄何業也自今宜責令國子監衙門平日檢舉不肖貢監如有鑽營謀為串通作弊者即行嚴拏究處如不行檢舉瞻徇弗問者將國子監官員皆以溺職重例論庶本原可清而科塲之弊竇乃塞則凡夤縁之監生知其無間可入自願本籍肄業應試又不在遣之回籍與不回籍也至㑹議京師首善之地國學教化之原不可虚無其人廷臣此議臣亦未敢以為非也如監生之為科塲厲階廷議未及剔除之法止據成例以無容議三字抹煞則非矣此臺臣之所以不平而復行條奏也臣合觀條奏㕘之廷議欲求一永逺無弊之法反覆思維而不可得盖立一法即叢一弊未見自古有不弊之法也為今日科塲計惟在除弊而舍嚴其法一着弊終不得而除也夫國家科塲條例非不嚴也非不詳且密也但視為具文而奉行者不力即近科來以關節告者纍纍報聞矣而考官之處分輕者降調重者革職而已其賄中者重者褫革輕者罰一科兩科不㑹試而已况舉發者少倖脫者多所以愈無畏忌也臣以為自今以往莫若嚴其處分榜發之後内有串通作弊者一經發覺問確即將考試各官革職充發夤縁中式者即照悖㫖例立置重典其父兄縱子弟作弊平日之家教可知亦照考試官例處分法在必行勿致倖脫則人即不畏清議抑不畏國法乎其愛功名能甚於愛性命乎臣故謂立法必當嚴也而臣尤有議焉夫科道兩衙門有言責者也開榜之後誰為賄通誰以勢得衆議􅍅􅍅豈能掩科道耳目特隠忍不肯言耳自今科道不言或被旁人首發亦將科道官嚴加處分以為瞻徇緘黙之戒如此庶人人知所警畏而科塲積弊可以漸除矣至垣臣滿普所奏三條一主考官務求行端學優之員一房考官多行揀選開列具題令夤縁者不得預為營謀一進塲後嚴行廵察不使有換巻代做之弊此皆科塲切要事務廷臣一一覆允所當勅下直省力為舉行者也若臣條奏試差積弊業經部覆臣何庸再置一喙縁係欽奉上諭詳奏事宜字多逾格貼黄難盡未敢另繕伏祈皇上睿鑒採擇施行康熈三十九年八月十八日欽差内閣中書馬喀賫奏奉㫖九卿詹事科道確議具奏特㕘鎮臣疏題為鎮臣貪婪揭中軍以卸過假身病以脫罪謹據實題㕘以肅軍政以飭邊防事竊惟湖南逼處苖地獨藉鎮筸一協以資防禦而汛廣兵單不足彈壓以致頑苖屢肆狂悖臣與提督臣林夲直再四籌畫因沅州與鎮筸相去匪遥故合詞具題將沅州總兵官張大受移駐鎮筸帶標兵一千名合筸協原兵共有二千一百名數庶幾軍威可壯頑苗聞風憚服或不敢仍肆狂悖也筸協副將亦撤帶標員移駐沅州荷䝉俞允仰見我皇上未雨綢繆之至計臣意為大受者屢䝉皇上格外知遇超拔今職竊以其身非木石必思精白乃心捐軀効力圖報君恩於萬一詎邇來貪婪無厭兵心離叛自知有干功令思為兎脫之計臣敢不據實題㕘也臣前九月間風聞筸兵有喧噪之舉出城離汛聚衆􅅝騰臣初以邉方兵卒素多驕悍或小欲不遂因鼓衆抗官者有之正在查訪間忽接到大受禀帖内稱散給秋餉時有原協兵丁聚四百餘人赴石陽哨觀望招揺捏創本職招諭一稿云夏秋皆有虚冐扣尅本職重視邉疆依冩持去等語又隨到麻陽縣知縣謝儀禀稱職於八月二十八日向鎮筸汛地監放餉銀行至石陽哨遇營兵數百人喊稱鎮協兩營撥汛不均本季包封數目不肯依從勒令卑職出給扣尅字様印信照帖等語臣固已疑其中顯有情弊矣乃至九月二十五日大受掲㕘中軍虞典病廢曠職臣已據掲題㕘遂又接到大受咨呈據稱得染膨脹病症醫藥罔靈右臂酸痛不能開弓苖藪重地誠恐貽悞伏祈亟賜代為題請解任調理等語觀其先後咨呈臣愈不能無疑焉遂即檄委辰沅靖道吳國士馳往親騐果否真病有無託故星速具報去後續於十月初五日准偏沅巡撫臣金璽咨十二日准提督臣林本直咨俱開鎮臣告病亟請㑹題等因臣又密加察訪始駭然於大受先掲虞典後託身病乃專為卸過脱罪地也盖大受自沅移鎮之時奉㫖令帶沅兵一千名大受不顧邊疆重大止帶兵四百七十三名虚冐五百二十七名更可異者又有總兵公費食糧一百二十分親丁食糧一百二十分苗頭食糧十分是其虚冐名糧貪饕已極且每季放餉每名扣尅一二錢不等以致衆兵沸騰遂於八月二十五日聚集石陽哨驚動士民喧噪不已大受欲令解散不得因與麻陽縣知縣給付印照至九月初四日方始歸伍則是大受前所禀稱虚冐扣尅竟係自已出首非虚脅可知矣此等行徑有原鎮恊百隊并小冩等可審証又十一月初五曰據辰沅靖道僉事吳國士騐病取醫生甘結詳覆前來禀報本道細訪該鎮今日居官不惟貪飲廢事兼又扣尅虚冐大失兵心至虚兵冐餉盈千纍百未可言盡邇因放餉兵譁今雖幸獲安堵尚有兵丁劉貴向小冩二人見著張守備看守未結等語内粘單一紙開有中軍虞典呈禀為遵㫖首明免罪事身鎮主貪横懼罪揑病乞休因典深悉惡蹟忽於九月十三日出文倒提初八日期亦捏以病廢掲㕘倘典去後鎮主贓欵敗露身命更遭波累等語又總鎮張為撫諭事因中軍妄議裁汰本鎮多食空糧以致爾等不服今再三勸息嗣後並不挾仇倘有上憲風聞或被旁人出首俱係本鎮擔當不干爾等衆人之事等語又總鎮張為給照事照得春秋二季餉到虚冐扣尅筸兵苦累不堪今同闔城紳衿耆老人等撫轉倘復因公挾私聽慿執此向上告理等語臣閱前諭係給沅兵者後照係給筸兵者是沅筸之兵俱與主將心懷攜貳將來士卒驕惰養成鷔之勢邊方重地設有不虞大受尚能驅䇿惟命乎臣念及此不勝髪指眦裂竊大受一介武夫職任總兵不思矢心報國而黷貨營私迨至穢聲彰聞清議不容乃先掲去中軍冀掩惡蹟又假托身病希圖倖免以辜負我皇上數十年豢養深恩真有玷官方貽悞地方仰祈乾斷立賜罷譴勅部嚴加議處另簡廉幹賢員任此重鎮庶邊防得人而兵民可圖綏靖矣伏祈皇上睿鑒勅部議覆施行康熈三十九年十一月初九日題華野疏稿巻三
