body:
  text: 華野疏稿巻二湖廣總督郭琇撰奏報起程疏奏為恭謝天恩併報微臣起程日期事康熙三十八年六月初六日准吏部咨開奉上諭九卿湖廣總督李輝祖已補授侍郎湖廣地方甚屬𦂳要原任左都御史郭琇前任吳江縣知縣居官甚優最清百姓至今稱頌行取内用行事能不畏人若補授湖廣總督必能更改弊習不徇情面有禆地方郭琇著補授湖廣總督即速行文馳驛速往赴任欽此欽遵等因到臣臣隨恭設香案望闕叩頭謝恩訖伏念臣一介庸愚䝉皇上特達之知膺不次之擢超遷左都御史後臣負罪復邀皇恩放歸田里幸此身未填溝壑凡餘生之年無非戴主之日本年二月間聖駕南巡臣匍匐道左未得仰瞻天顔駑駘依戀固結難伸今䝉皇上温諭以湖廣地方𦂳要命臣補授馳驛赴任聞命自天抱慚無地臣何人斯得邀封疆重任惟有捐糜踵頂潔已率屬以仰報聖恩於萬一耳惟是犬馬依戀之私分宜恭請陛見敬聆天語訓誨庶有式從奉有馳驛赴任之諭不敢稽遲瀆請謹於六月十五日自即墨縣兼程單騎前進容入境之後另行題報外所有微臣起程日期理合恭疏奏報伏乞皇上睿鑒施行為此具本謹奏聞康熙三十八年六月十五日具奏奉㫖該部知道恭請陛見疏奏為恭請陛見仰祈聖訓以開愚䝉以抒微誠事伏念我皇上勵精圖治宵旰不遑參贊𢎞猷駕唐虞而軼三代邇者巡視河工惟軫念元元為心屢渙綸音恩膏覃被普天之下無不歡聲雷動詠歌聖明矣乃猶念湖廣地方甚屬𦂳要不以臣為庸劣特簡臣補授湖廣總督且以臣為能更改弊習不徇情面天語寵嘉乃下及田間庸賤臣何人斯受皇上恩眷至此臣即捐糜頂踵何能仰報萬一亦惟益勵氷蘖竭忠自矢斯無負我皇上委任至意受事以來夙夜祇惕凡所以綏輯兵民澄清官吏以至地方利弊應興應革者無一不悉心體訪雖楚省幅􅊷遼濶臣涖任無㡬尚未周知而事宜已確有所見但地方積弊相沿有臣未可徑行者非得躬行面奏親聆皇上指示恐措置不無失宜此臣之所不能已於請也然而臣拳拳之誠猶有進者臣受皇上格外之恩始終生全自古知遇之隆未有過於臣者且臣暌違聖顔已逾十載犬馬尚有戀主之私况臣之畧曉詩書稍知忠義者乎臣年已六十有二衰病交侵倘一旦身填溝壑即欲一瞻天顔不可得矣仰懇鑒臣愚衷俯允陛見俾臣得躬聆聖訓則撫綏巖疆既遵循有據而臣戴主之微誠亦得稍盡矣臣總督闗防印信付湖廣撫臣年遐齡署理臣單騎而前往來不過兩月亦不至遲延誤事合併籲請伏冀睿慈俞允施行謹奏請㫖康熙三十八年閏七月十八日齎奏八月初九日奉㫖郭琇不必來京陛見該部知道據詳題㕘疏題為據詳題㕘事竊臣一介庸愚荷䝉皇上殊恩補授湖廣總督於康煕三十八年七月十五日到任以來惟有潔已率屬察吏安民以仰副我皇上愛養元元至意但楚省地方遼濶其所屬劣員雖經檄飭察訪必須司道揭報合臣採訪無異方敢據實指㕘於本年八月初六日據分守下荆南道㕘議蔣興芑詳報襄陽府知府黄章稱瘋咆哮正批行確查間又於八月初九日據該道復詳内稱黄章恣意饕餮横肆暴虐於閏七月二十五日已將貪酷各欵具揭在案臣隨查所稱二十五日具揭計已半月矣何該道八月初二初五兩日續發之詳已到其所稱欵揭之詳並未據到想該道已經揭報之語閃爍無憑除將知府黄章稱瘋咆哮情由先行據詳題㕘并於疏内聲明該道所揭是何欵蹟因何失此詳揭各情由俟察明補㕘等因於八月初十日拜疏之後始據該道詳為揭報貪酷知府肅吏治以安民生事内開襄陽府知府黄章不畏功令貪虐横行錢糧則勒加火耗奏銷則借名斂費驛遞則苛索心紅審事則酷用非刑官民受害怨聲沸騰誠難一日姑容民上今將本官劣蹟各欵開揭據實詳報一本官於本年七月二十二日將宜城縣交代不收殘馬六匹騾一頭差經承彭思舜押交襄陽縣當堂勒兌庫内錢糧銀一百二十六兩彭思舜外得銀二兩二十八日又差彭思舜復勒找馬價銀七十兩兑付交銀該縣經承孫毓秀証一本官於本年五月内指稱奏銷費用勒派襄棗二縣銀各一百五十兩均宜光南穀五州縣銀五十六十七十兩不等共派銀五百餘兩入已收銀户書經承郭天卿証一本官勒索襄陽宜城三驛每驛每季心紅銀四十兩五季共得銀六百兩兵房經承王之佐彭思舜審証一本官於本年二月𫝊各州縣限初九日早齊至諭話當面吩咐錢糧每兩要加耗五分再三懇減每百兩勒銀三兩一年實徵銀五萬三千一百零共勒銀一千五百九十三兩又勒隨包小封銀一百五十九兩入已各解錢糧經承審証一本官於本年四月内因本道出示嚴禁各州縣火耗雜派南漳民帥仁傑傅良佐曽章身曽士吉曽士懿等共欲勒石永禁差人鎖挐送監將帥仁傑夾一夾棍責三十板枷號兩個月餘各責三十板怨聲沸騰俱本人証一本官因李明五告李明宇等欠客賬將李明宇晉五馮益公拶指硃封還完放拶拶一晝夜昏暈數次兩臂青腫本人証一本年七月内有張茂蘭女嫁與武生高岳翠養子為媳因不令接看喊控學道發審本官並不訊問原被口供將媒人李世玉夾一夾棍寫婚人拶一拶指高岳翠打三十木嘴掌扭鎖送監本人審証等因到臣據此該臣看得知府為州縣表率守道職任監司知府有貪酷之處司道一有聞見即應揭報今襄陽府知府黄章貪酷各欵而分守下荆南道㕘議蔣興芑居處同城先則不即揭㕘後稱於閏七月二十五日已將貪酷各欵開具揭帖詳報何以該道八月初二日發行報黄章稱瘋咆哮之詳即於八月初六日到臣詳内亦未聲有已將各欵揭報之語又該道八月初五日發行報黄章退還勒要銀兩之詳即於八月初九日到臣其所稱閏七月二十五日欵揭詳文至八月初十日拜疏之後始到其中顯有瞻徇情弊因而倒寫月日以支飾前詳大非監司之體也今將詳揭襄陽府黄章貪酷各欵與該道瞻徇情由一併補㕘請㫖將知府黄章革職與有名蠧役証佐一併嚴提究擬其守荆道㕘議蔣興芑併請勅部嚴加議處者也臣謹具題伏祈皇上睿鑒勅部議覆施行康煕三十八年八月十一日題本年九月初三日奉㫖這所㕘黄章著革了職其貪酷各欵並本内有名人犯該撫嚴提究擬具奏蔣興芑該督嚴察議奏該部知道據詳補㕘疏題為據詳題㕘事康煕三十八年八月十三日據襄陽府知府黄章詳為詳明致病之由冒瀆本道獲罪事内開七月二十五日由省囬署赴本道稟旋即𫝊見盤問各禁示鄖襄有無功過卑府實言聞得署司事爐頭行賄風𫝊䝉開誠實告果有其事不足為慮乃於二十九日具有四詳一為詳請丁祭大典事照得八月初二日丁祭訪舊例憲臺先日行香正祭之日不同行禮豈憲臺另有定例典制乎合詳請示下本道批丁祭誰敢另定典制照從前舊例行繳一為詳請前門封鎖以掩耳目後門私開以通綫索恐玷官箴宜行堵塞事本道批居官貪穢雖重門嚴扃暮夜苞苴何難送入若操守亷潔雖洞開重門自無可議要塞即塞何必詳請此繳一為詳查院示不遵憲臺曽有聞見事本道批仰將違禁勒耗并諱匿職名速行揭報以憑詳㕘繳一為詳請憲役裁汰姓名示府以便存案事本道批本道衙役自有督撫部院行查非該府所得追問妄行詳請殊屬不合此繳等語到府卑府不解丁祭舊例之批查訊教官亦云襄例有先日行香之舉但無稽考不料八月初一日本道先至文廟拜謁而去一應屬員俱未及伺候無不恐懼卑府云同赴道轅認罪候久不𫝊正直文武講約之期卑府等即赴伺候道駕後至卑府迎揖於門本道怒目定視即隨入内至講畢掩門卑府於廣衆前稟實抱疾求轉報本道叱咤一時驚惶失措忽高聲喊呌乃瘋狂病作但此病卑府自幼屢試不第父兄督責綦嚴所以遇拂意即發非敢故意輕慢上司也此初一日始末詳明另具揭報并據揭開一本道違禁結院司為姻婭恣意貪婪委署布政司事嚇詐爐頭贓銀三千兩爐頭証一本道勅書駐劄鄖陽現有衙署今不遵依竟在襄陽舊治院衙門居住違悖勅書一治院衙門𦂳靠北城本道起造望江樓一座高過禁城毎登樓眺望左右居民婦女不敢往後院行走闔郡士庶証一本道聴信本地奸民李錫吾傾燒假銀又招陜民魏二住鐘樓寺傾化在外方行使李錫吾魏二可審本寺僧官覺念証一本道聘請左道吳清泉在署燒丹煉汞招留異術㒺顧禁約吳清泉可審一本道准馮金元尤尚義給示在棗陽縣曹劉家山招集匪𩔖私開銀礦山主曹士珍証一本道縱快役璩三夜役唐思賢私刑弔拷醫生梁自受府巻確據本人証一本道違悖詔欵將屢奉恩赦三十餘年舊事翻新准理赦前詞訟酷行夾打枷死王利被害伊兄王皆可審一本道誣良劉君益李二禿子楊鬍子馬天卿王水子等為盜並無失主對贓極刑鍛鍊成獄連夾七八次打一百二十雙扛仍各枷號三個月被害劉君益等証一本道縱土巡捕為鷹犬四出查訪日逐開單投報便拘審理民寃莫伸一本道恃院司姻親勢力凌虐下屬勒索規禮贓私纍纍印簿証一本道濫准詞訟擅立徳政碑三座於頭門違禁輒自立碑袁徳祖胡吉士孀婦彭氏等証等因到臣據此臣看得襄陽府知府黄章先據分守下荆南道蔣興芑詳報稱瘋咆哮及貪酷各欵經臣兩次據詳題㕘并查該道所稱閏七月二十五日欵揭詳文遲至八月初十日拜疏之後始到顯有瞻徇情弊因而倒寫月日以支飾前詳縁由一併指㕘請㫖在案今據知府黄章詳揭㕘議蔣興芑各欵詳内小日係八月初五日發行若該道前揭黄章賍欵詳文果係閏七月二十五日發行則黄章此詳應照官員將伊列欵糾㕘之後乃將上司列欵首告將所告之處不准行治罪但該道之詳似有倒提月日而黄章之詳似屬互訐又未便照㕘後訐告上司之例相應據詳補㕘請㫖將㕘議道蔣興芑革職與欵内有名犯証一併嚴提同知府黄章等併案質審究擬者也臣謹具題伏祈皇上睿鑒勅部議覆施行康熙三十八年八月十三日題本年九月初六日奉㫖這所㕘蔣興芑著革了職將詳訐各欵及有名犯証該督嚴提究擬具奏該部知道改折兵糧疏題為特請皇仁飭行改折以便兵民事欽惟我皇上軫念元元常慮一夫不得其所深仁厚澤霑被無遺前者巡視河工恩膏頻頒猶復惓惓以吏治民生為念伏讀上諭内開凡可以為民興利除害者作速勘實陳奏况臣膺寵命總理全楚灼見地方事宜歴來不便於民者敢不為我皇上陳之臣查湖北南糧一項所以協濟本省駐防官兵其他府州縣每年徵收本色支放兵糧殊為甚便獨有黄州府屬之黄梅麻城黄安三縣與夫武昌府屬之通山大冶二縣共米二萬七千二百二十二石零例應解至荆鄖等汛以支兵糧原無額設解費而各屬僻處萬山之中相去荆鄖地方有千餘里者有至一千六七百里者道路﨑嶇舟楫不通肩挑背負勢必不能將以騾䭾運交則必需二萬七千餘頭口其雇覔之價及百姓往返食用等費約計值米六萬石有餘是運一萬石之正數而需二萬石之糜費其費何自而來上官必責之有司捐解而有司果有如許之捐賠乎彼不得不責之百姓曰爾等米石爾等應解而百姓力有何能其欲釋一時之苦累勢必哀懇縣官折價差往彼地購買支放殊不知一折價間而百弊叢生矣其中胥役之科勒者有之包辦之侵漁者有之或不肖官吏因而浮取肥槖者亦有之是折價較之米值猶然二三倍不止民力㡬何豈堪如此之剥索如此之重困乎前康熙三十七年臺臣李先復曽以楚省五縣南糧等事籲請改折部覆行該督撫確查具題而地方各官慮以折銀給兵自購恐致米價騰貴各兵或至貼補每嵗須隨時估價責成糧道等語以致部駁不允謂每嵗以時價具報恐不肖官員具報浮多亦未可定駁之誠是也竊計荆鄖正當水米聚㑹之鄉五縣之米不過二萬七千零其價何至騰貴且查荆鄖厯年米價豐年值銀六七錢不等即遇歉收至八錢之外足矣酌豐歉之中每石折銀七錢不為不均且豐年多而歉嵗少以有餘補不足酌定價值既便於民亦何嘗有累於兵是當仍照臺臣條奏每石折銀七錢改入地丁冊内彚徵若恐南糧數目久或無稽仍於全書南糧項下註明某年改折兵糧若干奏銷查對亦甚易也即有不肖官吏亦不得於中滋行弊竇矣是一轉移間而小民省輓輸之勞免解運之費杜侵漁之累其感沐皇恩非淺鮮也臣自涖任以來而各屬之申詳與士民之環訴不已者皆謂運解糧米大有未便於民也臣今㑹同撫臣仰體皇上愛養斯民之至意因地察情據實陳請伏候上裁以便造冊報部併祈睿鑒施行謹合詞具題請㫖康煕三十八年九月十九日題十一月初十日部覆不允十一日奉㫖這事情著照該督所請行奏請均賦疏題為仰請皇仁酌行變通無損國課永除民累事竊謂湖廣一省幅􅊷遼濶濱江繞湖百姓易於失業幸䝉我皇上軫念民生輕徭薄賦深仁厚澤民得以休息咏歌太平矣但尚有一二事猶遺民累者臣得為我皇上陳之臣自涖任之始士民紛紛公陳謂有今昔異時徵賦頻仍皆因拘於成例以致未均者二事焉一賦偏重而累偏苦莫過於藩産湖北江夏咸寧武昌崇陽通城漢陽漢川景陵安陸雲夢應城孝感共一十三縣舊有楚租更名田地係故明藩産其地畝本皆瘠薄不堪為民間不毛之土撥給楚藩不過供飼牧之需曰鵝鴨田因而令民承種每年驗嵗之豐歉定穀之多寡原不因穀價以起科賦至輕也逮我朝定鼎以來此項租田始則每榖一石折銀二錢地不變肥穀不加多不論豐歉照此折徵已覺偏重至順治九年嵗荒榖貴每石折銀至四錢六分六釐共計折銀一萬五百兩零因嵗荒而穀少價貴因價貴而徵銀愈重較之初徵銀數竟一倍有餘相沿為例載在全書而民不愈覺偏累乎竊計楚省上則民田每畝不過徵銀二分四五釐或一分七八釐獨楚穀折銀每畝至一錢一二分零是以最下瘠薄之田較上則民賦重六七倍不止故偏重難完而逋欠拖累種種不已也前督撫諸臣屢行籲請减租部覆不允夫事歴多年賦闗國課減之誠難也臣愚以為此項穀折田地自應一視同仁照各縣上則民田一例起科按畝合算共折徵銀四千餘兩尚餘銀六千餘兩仍於十三縣田内各照數均攤每畆所加不過釐毫亦最輕易辦賦則均一原額無減而國課可以早輸楚佃得免偏累之苦彼世世子孫永沐皇恩於無既矣一有課額而無田土莫過於坍地湖北江夏嘉魚漢陽三縣地逼江濱洞庭荆江踞其上流水勢衝擊節年坍塌地畝不一而足如江夏之邊洲鯉魚廖蕎麥下陽林高埠等屯共坍地一百一十九頃零無徵課銀二百一十四兩零又草埠等里坍去民賦地十頃三十四畝零無徵條銀一十九兩八錢零漕米四石零嘉魚縣之大洲高麗軍營三屯共坍地六十六頃無徵課銀一百二十二兩零漢陽縣之懐澤里共坍民屯兩賦地三百餘頃無徵條遼租餉銀三百二十三兩零合三縣共計銀六百七十八兩八錢零漕米四石零有賦無田賠累難繼前督臣李輝祖業行上請豁免部覆謂如果水勢衝擊節年坍塌從前督撫豈有不行題請豁免以所題之處毋庸議第坍塌者係節年陸續坍塌在百姓以為有坍則有漲猶冀其漲者或可以補坍故民未敢遽報而督撫亦無憑具題也孰知因循既久而所坍者在此所漲者在彼彼之所漲者已陞科報部自不肯移彼補此而此之所坍者竟猶然如故也所以告賠告累嘵嘵請題豁免也臣以為豁免有虧國課亦應照前項將此坍塌地糧為數無多仍公攤於三縣田地數内庶衆擎易舉亦通變宜民之良法也以上二條實今昔異宜所應因時均賦者也叠據士民赴訴前來事闗地方民瘼不得不據實指陳仰候聖裁飭行另造清冊報部臣謹㑹同撫臣年遐齡合詞具題伏祈皇上睿鑒施行康熙三十八年九月十九日題部覆更名田地刋載全書遵行已久不便更張毋庸議又坍塌地畆錢糧為數無多應如該督所題十一月十三日奉㫖依議㑹㕘汙吏疏題為特㕘貪庸貪酷等官以清吏治事竊臣東鄙䜿儒荷膺寵命總理全楚君恩深重無以為報惟思精白乃心恪供厥職必期大法小亷無負我皇上愛養元元之至意或可仰答高厚於萬一也不意猶有愍不畏法怙過不悛如興國州知州張輝祖嘉禾縣知縣陳開泰其人者不思潔已以愛民而反厲民以肥已穢蹟多端不一而足據兩湖司道各揭報前來合之臣所察訪的有確據者無異謹臚列欵蹟為我皇上陳之計開武昌府興國州知州張輝祖欵蹟一本官本年四月内聴信經承余徳昌捏稱餉差不足著里書持侍生紅帖挨請百姓每石秋糧派銀二錢五分名曰樂輸合州共派銀七千兩零據糧里嚴自明年次齡等口訴自四月十三日起至今閏七月止共徵收過銀四千餘兩入已經承收簿可審一本官一切錢糧俱假手與保户梁佑人李爾千等包攬稱收正銀每兩加耗一錢七分扛解一錢一分合州額銀三萬五千兩耗扛共計九千餘兩官蠧包户朋分糧里樊漢若等証一本官庸劣尸位陋弊雖奉禁革而蠧役仍陽奉隂違每年徵收銀糧經承余徳昌董加㑹王定與總催王林黄勝保歇梁佑人李爾千每人於每里勒索銀四五兩不等米四五石不等衆蠧索取銀米共計有二千餘數漫不覺察糧里年次齡等証一本官縱容民壯石文一名石穀裕一名石道載一名石義仁侵盜在官料豆因而革役猶然盤踞州衙肆行無忌為伊兄犯事搶詳奪犯謀騙羅有萬妻子又伊合族以户孽狼奸出首竟使漏網反屢興刁詞或告状或條陳拖害多人健訟不一俱有案卷可查竟不按律究擬姑容肆横可謂官之木偶者矣被害殷永明陳仲漢等証衡州府嘉禾縣知縣陳開泰欵蹟一本官恣意貪婪勒令糧里十九家照現年六百三十丁石派銀六百三十兩名曰見面禮徵收入已皂頭蕭榮彭玉廖鳳等承催積保李生引送外又勒銀三十兩名曰𫝊送禮糧里李尚文謝志周証一本官遇新年糧里呈銀二十四兩曰新年呈儀又聴信班頭李希賢雷玉璣詹一卿李占白等派四季呈儀每季各里派銀三百五十兩共徵過銀七百兩入已皂壯頭彭選蕭榮李兆承催糧里廖思寛李春紅等証一本官往衡州府預派各里盤費銀一百二十兩大小什物銀一百八十兩入已外家人陳竒生刁丁相王彦新等往府六次每次勒派銀十九兩共銀一百一十四兩書役李可任蕭明謨雷先春李維春隨官往府勒索盤費銀三十八兩二次共派過銀七十六兩衆役可審一本官調取入簾派盤費銀一百八十兩勒限徵比李尚文等告限觸怒將十九家盡行監禁大板連比受害里民李徳先彭千伍等証此二官者穢聲著聞有玷官箴誠難一日容居民上所當特疏糾㕘請㫖將知州張輝祖知縣陳開泰革職與有名蠧役犯証一併嚴提究擬者也臣謹㑹同撫臣合詞具題康熙三十八年九月二十一日題趙楊閣揭為欽奉上諭事康熙三十八年十月初九日奉内閣行文内開九卿議得原任茶陵州知州趙國瑄指稱督撫生日私派銀兩以致陳丹書等激變情罪重大為此將趙國瑄擬斬立決原任巡撫楊鳳起明知私派以致激變譚廷玉等圍了州衙不行㕘奏乃掩飾以浮躁題㕘明係通同私派苦累百姓以致激變為此將楊鳳起擬絞立決原任總督不據實題㕘將李輝祖擬革職等因具題康煕三十八年九月二十三日拆出啟奏奉㫖這案九卿將趙國瑄楊鳳起定擬正法夾訊趙國瑄套夾嚇問楊鳳起將科派之處俱堅不承認亂行具供郭琇現任湖廣總督必知二人居官優劣及此案初起縁由爾等行文郭琇問明具奏欽此應行文該督文到將二人居官優劣及此案初起縁由作速開明印揭送本衙門可也為此合行前去欽遵查照施行等因到職奉此案查康熙三十六年十月二十六日據茶陵州知州趙國瑄申詳刁棍周來儀等侵蝕錢糧無補乘餉銀糟脚投櫃未拆於十月初八日倡黨搶刦打傷户書譚士賢搶去續二十五都餉銀四十九兩拆壊監鎖打傷禁卒譚君文等情隨於十月二十七日據南布按二司㑹詳議委長沙知府張維垣前往確查復於十一月二十一日准偏撫楊鳳起咨士民譁譟定係該州撫字乖方今調委衡同知茹儀鳳赴茶署篆該府即便摘取印信將趙國瑄及為首士民一併帶赴長沙以憑親訊題㕘等因後又於十二月十九日據南按察司詳稱該府查覆内稱據州判腰含英署吏目尉文言俱回稱周來儀等擁集州堂稱説徵派不明當同儒學勸釋衆皆集聚旌忠庵並無刦搶庫獄今俱已安撫解散等情隨經原任總督李輝祖偏撫楊鳳起將趙國瑄於大計内填列浮躁題㕘續於三十七年二月二十七日據南布按二司㑹詳請將周來儀等於羣虎博噬等事案内從重歸結此案請銷此係三十六年内趙國瑄撫字乖方士民譁譟之始末也又查陳丹書係茶陵州人與吳旦先訂約已久聞旦先要從西山率領人馬下衡遂糾集黨𩔖為之接應羣聚圍城此又在三十七年七月二十四日事趙國瑄已離任八月矣非伊任内事也獨是趙國瑄不能寓撫字於催科當餉糧並比之時若官不多勒羨餘經承不科索陋例而百姓何以擁集州堂抗稱徵派不明也是官役不法罪固難逭原任巡撫楊鳳起豈無聞見不將官役不法早行㕘處直待百姓喧譁之後始於大計内以浮躁㕘之是平日失察之咎亦應難辭此二官者劣則有之優則未也至私派一節職亦不敢諱為烏有乃湖省歴來之通弊也若以歴來之通弊激民叛逆而坐罪於趙國瑄楊鳳起二人予之斬絞亦非公論蓋陳丹書等之叛逆蓄志已久而譚姓等衆其嚮應之意亦希冀倖脱羣虎博噬之案獨趙國瑄楊鳯起適值其時耳皇上聖明寛大其罪之輕重大小自洞鑒無遺也其所謂指稱督撫生日私派百姓者職涖任之始即聞楚省之雜派種種名目不一而止已歴飭永禁矣尚未聞有督撫生日禮之耑名也或者此名即寓於衆目之中亦未可知第見有未真聞有未確亦不敢率然妄陳相應揭送為此合揭送内閣伏祈查照施行康熙三十八年十月十一日揭十一月二十六日内閣將揭啟奏奉㫖著内閣行文問前往審事官公與不公有無亂行之處董王閣揭為知㑹事康熙三十三年十月二十二日准兵部火牌遞到兵部咨送内閣公文一角内開為知㑹事湖廣巡撫金璽一本為衡永郴道董廷恩長沙府知府王奕曽於叛案内奉㫖革職今士民等籲請題留原任謹具奏聞一本於康熙三十八年十月初九日折奏奉㫖爾等行文郭琇將此二人居官優劣之處問明具奏文到將二人居官優劣之處開列明白速行内閣等因到職奉此查得分守衡永郴道董廷恩原任衡州府後調補長沙府知府王奕曽於去歲八月十一日逆賊陳丹書等謀叛侵犯衡城時副將陳盛告病卧牀營兵分防各汛存城兵丁僅有一百六七十名賊衆兵單事在危急該道府㑹同在城文武罄捐家資召募餘丁三百名又各率領親丁衙役分門堅守賞犒士卒及察聞城内奸細竊發拒捕當場擒斬數人抛屍城外喊諭賊知内應敗露遂於是夜潛遁即遣發把總王徳副將之子陳光國統兵飛行追𠞰赶至常寧賊方進城官兵擁入斬殺賊衆擒獲賊首是保守城池擒賊安民實董王二員之克盡厥職也因於叛案内革職准到部文轉行之後即有衡永郴三府州屬士民吳權等又長沙府屬士民余鼎臣等赴職衙門呈稱董廷恩王奕曽皆居官清亷恵澤及民深感平日愛養更䝉臨難保全民情愛戴籲請題留等情職因到任未久該道府果實心實政正在確察得實據情入告間隨准偏沅金撫院送到㑹稿具題今奉㫖行文查此二人居官優劣之處遵查董廷恩從前在任果能正已率屬愛養百姓賊冦臨城又能盡力保固調度有方王奕曽前任衡守於康熙三十六年内大計卓異於三十七年十月内奉㫖簡調蘇州府復因湖南田賦等事案内調補長沙府知府到任僅八月餘而賢聲著聞是以士民愛戴不辭跋涉千里赴省環署呼籲此二人者若非恵澤及民之深必不能使輿情愛戴之切是可稱居官之優者也倘䝉皇上格外垂恩准留原任以慰民望而該道府益勵後效於無已矣相應揭送内閣伏祈查照施行康熙三十八年十月二十四日揭審官閣揭為知㑹事康煕二十八年十一月十一日准兵部火牌遞咨内閣公文一角内開為知㑹事康熙三十八年十月二十七日將該督欽奉上諭事揭帖啟奏奉㫖這揭帖郭琇只將趙國瑄楊鳯起之處開出并未言及前往審事官員著仍行文郭琇將前往審事官員公與不公有無亂行之處問明具奏欽此行文該督文到即欽遵上諭作速開明揭送本衙門可也為此合行前去等因到職奉此查得郎中剛五達等奉㫖審事乃職未到任以前事也今奉㫖將前往審事官員公與不公有無亂行之處問明具奏職查剛五達察審叛犯具題疏内處分各官亦稍有議焉夫叛犯聚謀發覺地方而文武官若置㒺聞其處分也固宜其所經過地方而文武官不能防禦擒挐其處分也固宜至圍陷城池其官即無兵馬之責但不能城存與存城亡與亡其處分也亦宜獨趙國瑄居官不職不應入叛案之例與衡州府道董廷恩等竭力守城擒賊而審事本内不入守城之供以致一例處分此公論之所以不服也然是二案前已具揭聲明訖其餘之公與不公無憑可稽亦不敢草率妄陳至於亂行之處是誠有之職聞剛五達到長沙府有勒索銀錢過多之謡然此亦暮夜之金曖昧之事與受者皆有定例不惟受者不肯言即與者亦不敢言過而無據又何由而知其詳職亦不得過為臆議也及自長沙來武昌時先於本年四月二十五六等日差家人到省不入公館自佔文昌門外民房六所不容居住接娼妓歇宿以致百姓鳴鑼喧譁遂於五月初二日移住漢口鎮騾馬店内每日每人接妓女一名歌唱作樂日需裁縫工匠數十人食用供應日費多金夫審事官員既奉欽差而地方各官自應供給蓋所以尊朝廷而隆體統也然行徑乖張猶恐住久騷擾多事只得稟請起程日期以便伺候應之曰叙供修本還得㡬日竊思湖南審事將近半載尚有何供之未叙何本之未修竟於漢口逗留四十餘日延至六月十七日方始起行馬騾百餘蜂擁前途第思來時人不過數十餘口馬不過數十餘匹去時男女多人騾馬成羣試問此騾馬所装載者何自而來彼時萬耳萬目共見共聞豈不有玷官箴是其亂行可知矣皇上聖明無微不照久已洞悉其非故有㫖下問職就聞見之有據者畧為指陳又何敢代為之諱也相應揭送内閣伏祈查照施行康熙三十八年十一月十四日揭再請陛見疏奏為安民必祈聖訓面奏始盡微情敬竭愚誠再請陛見事恭惟我皇上治化光天世臻熙皞乃猶治愈求治安愈求安凡用人行政時厪宵旰之懐吏治民生尤切宸衷之慮因念湖廣地方𦂳要簡臣補授總督臣際昌期雖屬愚䝉亦具有心胸寧不感激奮發矢志靡遺圖報君恩於萬一哉邇者蠢爾紅苗無知梗化奉有作速𠞰撫之㫖仰賴皇上恩威漸次輸誠嚮化不日就撫當此兩湖晏安而臣之所以澄清地方仰酬聖恩者端在此時且欽奉上諭寵嘉以臣為能更改弊習不徇情面臣愚不徇情面益自砥礪更改弊習有可徑行者有未便徑行者臣受事以來夙夜祇惕有不能已於請見之心有不能已於面奏之事臣聞澄其源者流清目前之弊習易更而將來之弊習復生不思所以久安長治之道是臣負皇上之委任臣罪不滋大乎然地方利弊悉心體訪惟恐知之不真見之不確既真且確事宜之應興應革者有可陳之章奏即片牘而已該有不便陳之章奏雖百言而難盡在外臣工原不必來京陛見但臣所轄之地不同而請見之心更不同皇上鑒臣至愚之心實為國為民之心諒臣面奏之事亦為國為民之事皆仰體我皇上愛養元元之至意也正惟仰體聖懐是以不覺其計之愚而請之切矣臣年逾六旬衰病交侵痰症時發倘身填溝壑不特戀主之微情不得上達天聴而地方之利弊又何能直陳上聞乎仰懇俯鑒臣衷允臣所請俾得面奏微情親聆聖訓則巖疆弊習可得盡更而安民報主之愚誠亦得以稍遂矣臣依戀情殷字多逾格貼黄難盡伏祈睿鑒全覽施行謹奏請勅㫖康熙三十八年十一月十八日奏奉㫖郭琇著來京陛見該部知道移鎮彈壓疏題為防苗撫民必移鎮彈壓仰祈睿裁以靖邊疆以圖久安事竊惟我皇上神武天縱超越百王威徳所加四海賓服詎蠢爾紅苗小醜輒敢梗化者蓋因世際昇平未思預防堵禦之計耳試以狡苗所恃之險要邊地宜防之情形一一為我皇上陳之湖南辰州西南一帶苗地乃楚黔蜀萬山之交懸巖深澗路皆鳥道羊腸林木稠宻兼多瘴霧蠻烟其苗𩔖不一各倚箐峝為寨數百處而内巢生苗地更險峻性更悍頑自古不通聲教接壤漢土邊民頻遭攘竊惟藉鎮筸一協兵威彈壓但此地上接貴州銅仁協塘汛下抵瀘溪辰州塘汛地廣五百餘里險隘四十餘處苗路如梳所以明時沿邊築土墻三百八十里以限之分布官軍七千八百員名以防之而邊民猶受其患及至明末堵守無人邊墻俱已傾圮自我朝定鼎以來該協設官兵一千六百名以資彈壓於康熙二十三年為裁兵之成議已久等事案内裁去五百名僅存一千一百名副將駐劄五寨司城居中調度須兵守備駐防乾州控馭須兵分防麻陽縣鎮溪所以及大小塘汛八十餘處在在須兵歴任副將雖有汛廣兵單之請而前任督撫提鎮諸臣因制兵裁定且海宇昇平曷敢題請増添又各鎮營兵皆按地險易酌留亦難移撥止議令永順保靖二土司分寨撫管而土司相拒頗遥未免鞭長莫及且土司兵非經制性異情殊止可供偶爾之徵調若是永逺撫管更有未便是俱不可恃也故康熙二十四年即有補頂等寨狡苗跳梁恣行出没截陷官兵進攝半載而始就撫數年來苗𩔖生齒日繁貪性愈狡陷人勒贖視為不可破之積習又非可與二十四年同日而語也自上年十二月内出擾土人來圍塘汛傷死兵丁截去把總以致上瀆宸聰動發師旅現今調集漢土官兵數千員名遵㫖作速𠞰撫已陸續攝撫過一百餘寨俱已甘服向化矣尚有十餘寨乃敢拒敵抗命盤踞於最險之天星寨據報此寨在萬山之中懸巖壁立自下至頂高數百丈止有一路可上中有懸巖五處乃諸苗平素積糧所恃之險要屢遣順苗招諭抗不就撫現在嚴催領兵㕘將朱紱等設䇿撫𠞰竣功具報另疏㑹題外因思逆苗種𩔖繁多心性狡黠弱則稽首請命强則率衆跳梁我若興師問罪彼則竄匿深箐我若奏凱而歸彼則仍思跋扈所以自古不能斷其根株者蓋彼恃巖穴箐峝而處不須裹糧而行我則師行糧從支費浩繁縱能威加逼服殄絶邊氛而百姓之勞擾告累業已不可勝言所謂雖克所願動亦耗弊者此也此所以不得不亟籌防堵也防堵若嚴來則禦之去不窮追是以逸待勞之權自我而操較之臨時調兵跋涉﨑嶇輓運維艱者不㡬省如許勞擾乎近奉有鎮筸副將員缺著選擇題補之㫖是筸汛情形久在皇上洞鑒中矣臣謹㑹同偏撫臣金璽提督臣林本植再四籌酌不在目前聊且攝服之計而欲為善後久安之䇿莫若移鎮防堵之為愈也查沅州鎮標額兵一千九百五十名内存城一千三百名夫沅州係往來大道無甚險僻與鎮筸之孤懸苗地迥然有别當此承平日久似可不必重兵彈壓將該鎮總兵張大受撤帶本標將弁兵一千名就近移駐鎮筸衙門合筸協原兵一千一百共有二千一百名數矣即將鎮筸副將亦撤帶標員移沅州統領遺存兵九百五十名酌分防汛并以辰州沅州將弁永保二土司統歸該鎮管轄庶軍威壯而聲勢廣頑苗聞風畏憚當不敢肆行狂悖矣縱貪念復萌間有攘竊之故習該鎮或徑率標員堵截或飛調所轄漢土官兵聲援䇿應甚為便捷况總兵任大責重平日約束必嚴自無縱下起釁之弊設遇警息而調集所轄弁兵亦無彼此偏執岐視之情是一轉移間而邊地生民或可以安居樂業則感沐皇恩當非淺鮮矣再查署鎮筸協辰州副將張國勲已經革職臣委衡州副將金國正署理其人才技優長兼能整飭營伍熟識苗情乃前任督臣卓異保題引見䝉皇上鑒賞超擢衡協副將者也今以之調補筸協移駐沅州亦可為人地相宜銜缺相當至衡協員缺伏候勅部另選但事闗地方重務非臣等所敢専擅也謹合詞具題統候聖裁臣等為地方情形起見詳切直陳字多逾格貼黄難盡伏懇睿鑒全覽施行康熙三十八年十一月十八日題奉㫖該部議奏部議允行十二月十五日奉㫖依議華野疏稿巻二
